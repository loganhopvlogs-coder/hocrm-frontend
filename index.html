<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House of Cars — CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{border-radius:2px;background:#2a2a38}
.tab-btn{background:none;border:none;cursor:pointer;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.lead-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .15s;border-bottom-width:1px;border-bottom-style:solid}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{border-radius:22px;padding:40px 36px;width:420px;max-width:100%}
.skeleton{background:linear-gradient(90deg,#1a1a24 25%,#222230 50%,#1a1a24 75%);background-size:1000px 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;flex-shrink:0}
.fu{animation:fadeUp .3s ease both}
.pool-btn{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const SUPA_URL = "https://dmeigygmmxwmkyniizzj.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZWlneWdtbXh3bWt5bmlpenpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzU2NDEsImV4cCI6MjA4ODE1MTY0MX0.hTv4RICUBNWFNLsQEaZVqcbviqD0ZZSinwCzdSLRDJo";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
const INV_URL = "https://hocrm-backend.onrender.com/inventory";
const ALLOWED = ["houseofcarscalgary.com","houseofcars.com"];
const LOCS = ["52 Street","Airdrie","Barlow Trail","Chinook","Cochrane","Deerfoot Meadows","MacLeod Trail","McKnight Blvd","Olympic Park","Edmonton","Lethbridge","Medicine Hat"];
const STATUS_C = {Hot:"#E63946",Warm:"#FF9500",Cold:"#555"};
const typeEmoji = t=>({Truck:"🛻",SUV:"🚙",Sedan:"🚗",Van:"🚐"}[t]||"🚗");
const fmtCur = n=>n?"$"+Number(n).toLocaleString():"—";
const fmtDate = d=>d?new Date(d).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"}):"—";
const fmtKM = m=>m?String(m).replace(/\B(?=(\d{3})+(?!\d))/g,",")+(" KM"):"";

const THEMES = {
  dark:  {name:"Dark (Default)",bg:"#0A0A0F",surface:"#13131A",border:"#1E1E2A",text:"#E8E8F0",muted:"#555",accent:"#E63946",nav:"#0D0D14",input:"#16161f",inputBorder:"#252535"},
  light: {name:"Light",         bg:"#F0F2F5",surface:"#FFFFFF", border:"#E0E0E8",text:"#111118",muted:"#888",accent:"#E63946",nav:"#FFFFFF", input:"#F5F5FA",inputBorder:"#D0D0DC"},
  blue:  {name:"Midnight Blue", bg:"#050C1A",surface:"#0D1B2E",border:"#1A2E45",text:"#E8F0FF",muted:"#4A6080",accent:"#0A84FF",nav:"#070E1C",input:"#0A1525",inputBorder:"#1A2E45"},
  green: {name:"Forest",        bg:"#060F0A",surface:"#0D1F12",border:"#1A3020",text:"#E0F0E8",muted:"#3A6045",accent:"#34C759",nav:"#070F08",input:"#0A1A0E",inputBorder:"#1A3020"},
  purple:{name:"Violet",        bg:"#0A060F",surface:"#15101F",border:"#251A35",text:"#EEE8FF",muted:"#5A4070",accent:"#BF5AF2",nav:"#0C0812",input:"#130E1C",inputBorder:"#251A35"},
  white: {name:"Clean White",   bg:"#FFFFFF", surface:"#F8F9FA",border:"#DEE2E6",text:"#212529",muted:"#6C757D",accent:"#E63946",nav:"#FFFFFF", input:"#FFFFFF", inputBorder:"#CED4DA"},
};

function getT(u){
  const k = u?.theme?.mode||"dark";
  return THEMES[k]||THEMES.dark;
}

function normalizeV(v,i){
  return {id:i+1,stock:v.stock||"HOC-"+i,vin:v.vin||"",year:v.year||0,make:v.make||"",model:v.model||"",
    price:v.price||0,mileage:v.mileage||"",location:v.location||"",type:v.bodyType||v.type||"",
    color:v.color||"",image:v.image||"",listingUrl:v.listingUrl||v.url||"",condition:v.condition||"Used"};
}

function buildAd(v, features, intro){
  const feat = features||"• All-Wheel Drive\n• Leather Interior\n• Heated Seats\n• Backup Camera\n• Premium Sound\n• Dual-Zone Climate Control\n• Power Everything\n• Push-Button Start\n• Alloy Wheels";
  const opening = intro||`Looking for a great ${v.type||"vehicle"} without breaking the bank? This ${v.year} ${v.make} ${v.model} delivers exactly that.`;
  const colorLine = v.color?`${v.color} on ${v.color} `:"";
  return `${v.year} ${v.make} ${v.model} ${colorLine}🔥 Stock #${v.stock} ${fmtKM(v.mileage)} ${fmtCur(v.price)} + GST

${opening}

Finished in ${v.color||"a great colour"}, this ${v.type||"vehicle"} brings sharp styling, smooth handling, and premium comfort together in one sharp package. Perfect for Alberta roads year-round.

Loaded with features including:
${feat}

${fmtKM(v.mileage)?fmtKM(v.mileage)+" — p":"P"}riced aggressively at ${fmtCur(v.price)} + GST to reflect excellent value for the year and trim.

Financing available O.A.C. All credit types welcome — good, bad, rebuilding, or great.

AMVIC Licensed Dealer.

Message today to book a test drive before it's gone!

#HouseOfCars #${(v.make||"").replace(/\s/g,"")} #${(v.model||"").replace(/\s/g,"")} #UsedCars #Alberta #CarSales #HouseOfCars${(v.location||"").replace(/\s/g,"")}`;
}

function App(){
  const [screen,setScreen] = useState("login");
  const [user,setUser]     = useState(null);
  const [tab,setTab]       = useState("dashboard");
  const [T,setT]           = useState(THEMES.dark);
  const [themeKey,setThemeKey] = useState("dark");

  // Auth
  const [lf,setLf]       = useState({email:"",password:""});
  const [sf,setSf]       = useState({firstName:"",lastName:"",email:"",location:"",role:"Sales",password:"",confirm:""});
  const [fgEmail,setFgEmail] = useState("");
  const [aErr,setAErr]   = useState("");
  const [aMsg,setAMsg]   = useState("");
  const [aLoad,setALoad] = useState(false);
  const [showPw,setShowPw] = useState(false);

  // Inventory
  const [inv,setInv]         = useState([]);
  const [invLoad,setInvLoad] = useState(false);
  const [invErr,setInvErr]   = useState("");
  const [synced,setSynced]   = useState(null);
  const [syncing,setSyncing] = useState(false);
  const [syncMsg,setSyncMsg] = useState({t:"",type:""});
  const [iFilter,setIFilter] = useState("All");
  const [iLoc,setILoc]       = useState("All");
  const [iSort,setISort]     = useState({col:"price",dir:"desc"});
  const [iSearch,setISearch] = useState("");

  // Clients
  const [clients,setClients]   = useState([]);
  const [cLoad,setCLoad]       = useState(false);
  const [selC,setSelC]         = useState(null);
  const [addC,setAddC]         = useState(false);
  const [editC,setEditC]       = useState(false);
  const [cf,setCf]             = useState({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});
  const [pairModal,setPairModal] = useState(null);
  const [cMsg,setCMsg]         = useState({t:"",type:""});
  const [cSearch,setCSearch]   = useState("");
  const [vSearch,setVSearch]   = useState("");
  const [poolNote,setPoolNote] = useState("");

  // Pool
  const [pool,setPool]         = useState([]);
  const [poolLoad,setPoolLoad] = useState(false);
  const [poolMsg,setPoolMsg]   = useState({t:"",type:""});

  // Posts
  const [posts,setPosts]       = useState([]);
  const [pLoad,setPLoad]       = useState(false);
  const [draftOpen,setDraftOpen] = useState(false);
  const [draftV,setDraftV]     = useState(null);
  const [draftTitle,setDraftTitle] = useState("");
  const [draftText,setDraftText]   = useState("");
  const [draftFeat,setDraftFeat]   = useState("");
  const [draftIntro,setDraftIntro] = useState("");
  const [draftImg,setDraftImg]     = useState("");
  const [draftSearch,setDraftSearch] = useState("");
  const [editPost,setEditPost] = useState(null);
  const [pMsg,setPMsg]         = useState({t:"",type:""});

  // Accounts
  const [users,setUsers]       = useState([]);
  const [uLoad,setULoad]       = useState(false);
  const [rf,setRf]             = useState({firstName:"",lastName:"",email:"",location:"",role:"Sales",password:"",confirm:""});
  const [rErr,setRErr]         = useState("");
  const [rOk,setROk]           = useState(false);
  const [rLoad,setRLoad]       = useState(false);
  const [resetTarget,setResetTarget] = useState(null);
  const [resetPw,setResetPw]   = useState("");
  const [resetMsg,setResetMsg] = useState("");

  // Notifs & settings
  const [notifs,setNotifs]     = useState([]);
  const [showNotifs,setShowNotifs] = useState(false);
  const [settingsOpen,setSettingsOpen] = useState(false);
  const notifRef = useRef(null);

  // ── Styles ────────────────────────────────────────────────────
  const card  = {background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:20};
  const inp   = {background:T.input,border:`1px solid ${T.inputBorder}`,borderRadius:9,color:T.text,padding:"11px 14px",fontFamily:"'DM Sans',sans-serif",fontSize:13,width:"100%",outline:"none"};
  const btnP  = {background:T.accent,color:"#fff",border:"none",borderRadius:9,padding:"10px 18px",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"};
  const btnS  = {background:"rgba(128,128,128,.1)",color:T.text,border:`1px solid ${T.border}`,borderRadius:7,padding:"7px 13px",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,cursor:"pointer"};
  const nBase = {borderRadius:10,padding:"11px 16px",fontSize:13,marginBottom:14,border:"1px solid"};
  const nOk   = {...nBase,background:"rgba(52,199,89,.1)",borderColor:"rgba(52,199,89,.3)",color:"#34C759"};
  const nErr  = {...nBase,background:"rgba(230,57,70,.1)",borderColor:"rgba(230,57,70,.3)",color:"#E63946"};
  const nInfo = {...nBase,background:"rgba(10,132,255,.1)",borderColor:"rgba(10,132,255,.3)",color:"#4da3ff"};
  const nWarn = {...nBase,background:"rgba(255,149,0,.1)",borderColor:"rgba(255,149,0,.3)",color:"#FF9500"};

  const isAdmin   = user?.role==="Admin";
  const isManager = user?.role==="Manager";

  function canSee(c){
    if(isAdmin) return true;
    if(isManager) return c.assigned_location===user?.location;
    return c.created_by===user?.id;
  }

  // ── Loaders ───────────────────────────────────────────────────
  const loadInv = async(force=false)=>{
    if(force){setSyncing(true);setSyncMsg({t:"",type:""});}
    else{setInvLoad(true);setInvErr("");}
    try{
      const r=await fetch(INV_URL);
      if(!r.ok)throw new Error("API error "+r.status);
      const j=await r.json();
      if(!j.success)throw new Error(j.error||"Backend error");
      if(!j.vehicles?.length)throw new Error("No vehicles returned.");
      setInv(j.vehicles.map(normalizeV));
      setSynced(new Date().toLocaleTimeString("en-CA",{hour:"2-digit",minute:"2-digit"}));
      if(force)setSyncMsg({t:"✅ "+j.vehicles.length+" vehicles synced.",type:"success"});
    }catch(e){
      if(force)setSyncMsg({t:"❌ "+e.message,type:"error"});
      else setInvErr(e.message);
    }finally{
      setInvLoad(false);setSyncing(false);
      if(force)setTimeout(()=>setSyncMsg({t:"",type:""}),5000);
    }
  };
  const loadClients=async()=>{
    setCLoad(true);
    const{data}=await sb.from("clients").select("*").order("created_at",{ascending:false});
    if(data)setClients(data);
    setCLoad(false);
  };
  const loadPool=async()=>{
    setPoolLoad(true);
    const{data}=await sb.from("lead_pool")
      .select("*, client:clients(*), adder:users!lead_pool_added_by_fkey(first_name,last_name,location)")
      .eq("status","available").order("created_at",{ascending:false});
    if(data)setPool(data);
    setPoolLoad(false);
  };
  const loadPosts=async()=>{
    setPLoad(true);
    const{data}=await sb.from("posts").select("*").order("created_at",{ascending:false});
    if(data)setPosts(data);
    setPLoad(false);
  };
  const loadUsers=async()=>{
    setULoad(true);
    const{data}=await sb.from("users").select("id,email,first_name,last_name,location,role,status,created_at").order("created_at",{ascending:false});
    if(data)setUsers(data);
    setULoad(false);
  };
  const loadNotifs=async()=>{
    if(!user)return;
    const{data}=await sb.from("notifications").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(25);
    if(data)setNotifs(data);
  };

  useEffect(()=>{
    if(screen==="app"){
      loadInv();loadClients();loadPool();loadPosts();loadUsers();loadNotifs();
      const iv=setInterval(()=>{loadNotifs();loadPool();},30000);
      return()=>clearInterval(iv);
    }
  },[screen]);

  useEffect(()=>{
    const h=e=>{if(notifRef.current&&!notifRef.current.contains(e.target))setShowNotifs(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  // ── Auth ──────────────────────────────────────────────────────
  const doLogin=async()=>{
    setAErr("");setALoad(true);
    const{data,error}=await sb.from("users").select("*").eq("email",lf.email.toLowerCase().trim()).single();
    if(error||!data){setAErr("No account found with that email.");setALoad(false);return;}
    if(data.status==="disabled"){setAErr("Your account has been disabled. Contact your administrator.");setALoad(false);return;}
    if(data.password_hash!==lf.password&&data.temp_password!==lf.password){setAErr("Incorrect password.");setALoad(false);return;}
    const t=getT(data);setT(t);setThemeKey(data?.theme?.mode||"dark");
    setUser(data);setScreen("app");setALoad(false);
  };
  const doSignup=async()=>{
    setAErr("");
    const{firstName,lastName,email,password,confirm,location}=sf;
    if(!firstName||!lastName||!email||!password||!location){setAErr("Please fill in all required fields.");return;}
    const domain=email.split("@")[1]?.toLowerCase();
    if(!ALLOWED.includes(domain)){setAErr("Only @houseofcars.com and @houseofcarscalgary.com allowed.");return;}
    if(password.length<8){setAErr("Password must be at least 8 characters.");return;}
    if(password!==confirm){setAErr("Passwords do not match.");return;}
    setALoad(true);
    const{data:ex}=await sb.from("users").select("id").eq("email",email.toLowerCase()).single();
    if(ex){setAErr("An account with this email already exists.");setALoad(false);return;}
    const{data,error}=await sb.from("users").insert({email:email.toLowerCase().trim(),first_name:firstName,last_name:lastName,location,role:sf.role,password_hash:password,status:"active"}).select().single();
    if(error){setAErr("Error: "+error.message);setALoad(false);return;}
    setT(THEMES.dark);setUser(data);setScreen("app");setALoad(false);
  };

  // ── Clients ───────────────────────────────────────────────────
  const saveClient=async()=>{
    if(!cf.name){setCMsg({t:"Name is required.",type:"error"});return;}
    const{data,error}=await sb.from("clients").insert({...cf,created_by:user.id,assigned_location:user.location,last_contact:new Date().toISOString()}).select().single();
    if(error){setCMsg({t:"Error: "+error.message,type:"error"});return;}
    setClients(p=>[data,...p]);setAddC(false);
    setCf({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});
    setCMsg({t:"✅ Client saved!",type:"success"});setTimeout(()=>setCMsg({t:"",type:""}),3000);
  };
  const updateClient=async()=>{
    const{data,error}=await sb.from("clients").update(cf).eq("id",selC.id).select().single();
    if(error){setCMsg({t:"Error: "+error.message,type:"error"});return;}
    setClients(p=>p.map(c=>c.id===data.id?data:c));setSelC(data);setEditC(false);
    setCMsg({t:"✅ Updated!",type:"success"});setTimeout(()=>setCMsg({t:"",type:""}),3000);
  };
  const deleteClient=async(id)=>{
    if(!window.confirm("Delete this client? Cannot be undone."))return;
    await sb.from("clients").delete().eq("id",id);
    setClients(p=>p.filter(c=>c.id!==id));setSelC(null);
  };
  const pairVehicle=async(client,vehicle)=>{
    const{data,error}=await sb.from("clients").update({interested_in:vehicle.year+" "+vehicle.make+" "+vehicle.model,paired_vehicle_stock:vehicle.stock}).eq("id",client.id).select().single();
    if(!error&&data){setClients(p=>p.map(c=>c.id===data.id?data:c));setSelC(data);}
    setPairModal(null);setVSearch("");
  };

  // ── Lead Pool ─────────────────────────────────────────────────
  const addToPool=async(client)=>{
    if(!window.confirm("Add '"+client.name+"' to the Lead Pool? Other reps will be notified."))return;
    const{error}=await sb.from("lead_pool").insert({client_id:client.id,added_by:user.id,note:poolNote,status:"available"});
    if(error){setPoolMsg({t:"Error: "+error.message,type:"error"});return;}
    const others=users.filter(u=>u.id!==user.id&&u.status==="active");
    if(others.length>0){
      await sb.from("notifications").insert(others.map(u=>({
        user_id:u.id,
        message:`🔔 ${user.first_name} ${user.last_name} needs help with lead: ${client.name}. Check the Lead Pool!`,
        link_tab:"pool",read:false
      })));
    }
    setPoolNote("");
    setPoolMsg({t:"✅ Added to Lead Pool! "+others.length+" reps notified.",type:"success"});
    setTimeout(()=>setPoolMsg({t:"",type:""}),4000);
    loadPool();
  };
  const claimFromPool=async(item)=>{
    await sb.from("lead_pool").update({status:"claimed",claimed_by:user.id}).eq("id",item.id);
    await sb.from("clients").update({created_by:user.id,assigned_location:user.location}).eq("id",item.client_id);
    await sb.from("notifications").insert({user_id:item.added_by,message:`✅ ${user.first_name} ${user.last_name} claimed your lead: ${item.client?.name}`,link_tab:"clients",read:false});
    loadPool();loadClients();
  };

  // ── Ad Drafts ─────────────────────────────────────────────────
  const openDraft=(vehicle=null,post=null)=>{
    if(post){
      setEditPost(post);setDraftTitle(post.vehicle_title||"");setDraftText(post.draft_text||"");
      setDraftImg(post.vehicle_image||"");setDraftFeat("");setDraftIntro("");
      setDraftV(inv.find(v=>v.stock===post.vehicle_stock)||null);
    }else{
      setEditPost(null);setDraftV(vehicle);setDraftFeat("");setDraftIntro("");
      if(vehicle){setDraftTitle(vehicle.year+" "+vehicle.make+" "+vehicle.model);setDraftImg(vehicle.image||"");setDraftText(buildAd(vehicle));}
      else{setDraftTitle("");setDraftText("");setDraftImg("");}
    }
    setDraftSearch("");setDraftOpen(true);
  };
  const saveDraft=async(status="Draft")=>{
    if(!draftText){setPMsg({t:"Please write your ad text first.",type:"error"});return;}
    const payload={vehicle_stock:draftV?.stock||null,vehicle_title:draftTitle,draft_text:draftText,vehicle_image:draftImg||draftV?.image||"",status,created_by:user.id,posted_at:status==="Posted"?new Date().toISOString():null};
    if(editPost){
      const{data,error}=await sb.from("posts").update(payload).eq("id",editPost.id).select().single();
      if(error){setPMsg({t:"Error: "+error.message,type:"error"});return;}
      setPosts(p=>p.map(x=>x.id===data.id?data:x));
    }else{
      const{data,error}=await sb.from("posts").insert(payload).select().single();
      if(error){setPMsg({t:"Error: "+error.message,type:"error"});return;}
      setPosts(p=>[data,...p]);
    }
    setDraftOpen(false);
    setPMsg({t:status==="Draft"?"✅ Draft saved!":"✅ Marked as posted!",type:"success"});
    setTimeout(()=>setPMsg({t:"",type:""}),4000);
  };
  const openMarketplace=()=>{
    navigator.clipboard.writeText(draftText).catch(()=>{});
    window.open("https://www.facebook.com/marketplace/create/vehicle","_blank");
    saveDraft("Posted");
  };
  const deletePost=async(id)=>{
    if(!window.confirm("Delete this draft?"))return;
    await sb.from("posts").delete().eq("id",id);
    setPosts(p=>p.filter(x=>x.id!==id));
  };

  // ── User Management ───────────────────────────────────────────
  const doRegister=async()=>{
    setRErr("");setROk(false);
    const{firstName,lastName,email,password,confirm,location}=rf;
    if(!firstName||!lastName||!email||!password||!location){setRErr("Please fill in all required fields.");return;}
    const domain=email.split("@")[1]?.toLowerCase();
    if(!ALLOWED.includes(domain)){setRErr("Only @houseofcars.com and @houseofcarscalgary.com allowed.");return;}
    if(password.length<8){setRErr("Password must be at least 8 chars.");return;}
    if(password!==confirm){setRErr("Passwords do not match.");return;}
    setRLoad(true);
    const{data:ex}=await sb.from("users").select("id").eq("email",email.toLowerCase()).single();
    if(ex){setRErr("An account with this email already exists.");setRLoad(false);return;}
    const{error}=await sb.from("users").insert({email:email.toLowerCase().trim(),first_name:firstName,last_name:lastName,location,role:rf.role,password_hash:password,status:"active"});

  // ── Inventory filter/sort ─────────────────────────────────────
  const invTypes=["All",...Array.from(new Set(inv.map(v=>v.type).filter(Boolean))).sort()];

    d.sort((a,b)=>{let av=a[iSort.col],bv=b[iSort.col];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return iSort.dir==="asc"?(av>bv?1:-1):(av<bv?1:-1);});
    return d;
  },[inv,iFilter,iLoc,iSearch,iSort]);
  const toggleSort=col=>setISort(s=>({col,dir:s.col===col&&s.dir==="asc"?"desc":"asc"}));

            </div>

                            {u.id!==user?.id&&(
                              <div style={{display:"flex",gap:6}}>
                                <button style={{...btnS,fontSize:11,padding:"4px 9px"}} onClick={()=>{setResetTarget(u);setResetPw("");setResetMsg("");}}>🔑 Reset PW</button>
                                <button style={{...btnS,fontSize:11,padding:"4px 9px",color:u.status==="active"?"#E63946":"#34C759",borderColor:u.status==="active"?"rgba(230,57,70,.4)":"rgba(52,199,89,.4)"}} onClick={()=>toggleStatus(u)}>
                                  {u.status==="active"?"🚫 Disable":"✅ Enable"}
                                </button>
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={{...card,position:"sticky",top:0}}>
                <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:14,letterSpacing:1,textTransform:"uppercase"}}>🔐 Create New Account</div>
                {rOk&&<div style={nOk}>✅ Account created!</div>}
                {rErr&&<div style={nErr}>⚠️ {rErr}</div>}
                <div style={{display:"grid",gap:10}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                    <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>First Name</div><input style={inp} placeholder="First" value={rf.firstName} onChange={e=>{setRf(p=>({...p,firstName:e.target.value}));setRErr("");setROk(false);}}/></div>
                    <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Last Name</div><input style={inp} placeholder="Last" value={rf.lastName} onChange={e=>{setRf(p=>({...p,lastName:e.target.value}));setRErr("");setROk(false);}}/></div>
                  </div>
                  <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Work Email</div><input style={inp} placeholder="name@houseofcars.com" value={rf.email} onChange={e=>{setRf(p=>({...p,email:e.target.value}));setRErr("");setROk(false);}}/></div>
                  <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Location</div>
                    <select style={inp} value={rf.location} onChange={e=>setRf(p=>({...p,location:e.target.value}))}>
                      <option value="">Select…</option>
                      {LOCS.map(l=><option key={l} value={l}>{l}</option>)}
                    </select>
                  </div>
                  <div><div style={{fontSize:11,color:T.muted,marginBottom:5}}>Role</div>
                    <div style={{display:"flex",gap:7}}>
                      {["Sales","Manager","Admin"].map(r=>(
                        <button key={r} onClick={()=>setRf(p=>({...p,role:r}))} style={{flex:1,background:rf.role===r?T.accent+"22":"rgba(128,128,128,.08)",color:rf.role===r?T.accent:T.muted,border:"1px solid",borderColor:rf.role===r?T.accent+"44":T.border,borderRadius:7,padding:"6px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{r}</button>
                      ))}
                    </div>
                  </div>
                  <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Temp Password</div><input style={inp} type="password" placeholder="Min. 8 chars" value={rf.password} onChange={e=>setRf(p=>({...p,password:e.target.value}))}/></div>
                  <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Confirm</div><input style={inp} type="password" placeholder="Repeat" value={rf.confirm} onChange={e=>setRf(p=>({...p,confirm:e.target.value}))}/></div>
                  <button style={{...btnP,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={doRegister} disabled={rLoad}>
                    {rLoad?<><span className="spin"></span>Creating…</>:"Create Account"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

      </div>{/* end content */}

      {/* ═══ MODALS ═══ */}

      {/* Add Client */}
      {addC&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setAddC(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:580,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color:T.text}}>ADD NEW CLIENT</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setAddC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Full Name *</div><input style={inp} placeholder="Full name" value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Phone</div><input style={inp} placeholder="403-555-0000" value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Email</div><input style={inp} type="email" placeholder="client@email.com" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Location / Area</div><input style={inp} placeholder="e.g. Calgary NW" value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:5}}>Status</div>
                <div style={{display:"flex",gap:8}}>
                  {["Hot","Warm","Cold"].map(s=>(
                    <button key={s} onClick={()=>setCf(p=>({...p,status:s}))} style={{flex:1,background:cf.status===s?STATUS_C[s]:"rgba(128,128,128,.08)",color:cf.status===s?"#fff":T.muted,border:"1px solid",borderColor:cf.status===s?STATUS_C[s]:T.border,borderRadius:7,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Interested In</div>
                <select style={inp} value={cf.interested_in} onChange={e=>{const v=inv.find(x=>x.year+" "+x.make+" "+x.model===e.target.value);setCf(p=>({...p,interested_in:e.target.value,paired_vehicle_stock:v?.stock||""}));}}>
                  <option value="">Select a vehicle…</option>
                  {inv.slice(0,150).map((v,i)=><option key={i} value={v.year+" "+v.make+" "+v.model}>{v.year} {v.make} {v.model} — {fmtCur(v.price)} · {v.location}</option>)}
                </select>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Notes</div><textarea style={{...inp,minHeight:80,resize:"vertical"}} placeholder="Financing, preferences, follow-up notes…" value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button style={btnP} onClick={saveClient}>Save Client</button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Client */}
      {editC&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setEditC(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:540,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color:T.text}}>EDIT CLIENT</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setEditC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Full Name *</div><input style={inp} value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Phone</div><input style={inp} value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Email</div><input style={inp} type="email" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Location</div><input style={inp} value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:5}}>Status</div>
                <div style={{display:"flex",gap:8}}>
                  {["Hot","Warm","Cold"].map(s=>(
                    <button key={s} onClick={()=>setCf(p=>({...p,status:s}))} style={{flex:1,background:cf.status===s?STATUS_C[s]:"rgba(128,128,128,.08)",color:cf.status===s?"#fff":T.muted,border:"1px solid",borderColor:cf.status===s?STATUS_C[s]:T.border,borderRadius:7,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Notes</div><textarea style={{...inp,minHeight:80,resize:"vertical"}} value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button style={btnP} onClick={updateClient}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* Pair Vehicle */}
      {pairModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>{setPairModal(null);setVSearch("");}}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:580,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>PAIR VEHICLE — {pairModal.name?.toUpperCase()}</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>{setPairModal(null);setVSearch("");}}>×</button>
            </div>
            <input style={{...inp,marginBottom:12}} placeholder="🔍 Search make, model, year, stock, location…" value={vSearch} onChange={e=>setVSearch(e.target.value)} autoFocus/>
            <div style={{display:"grid",gap:8,maxHeight:420,overflowY:"auto"}}>
              {srchV.map((v,i)=>(
                <div key={i} onClick={()=>pairVehicle(pairModal,v)} style={{display:"flex",alignItems:"center",gap:12,background:pairModal.paired_vehicle_stock===v.stock?T.accent+"22":T.bg,border:`1px solid ${pairModal.paired_vehicle_stock===v.stock?T.accent:T.border}`,borderRadius:10,padding:"11px 14px",cursor:"pointer",transition:"all .15s"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{typeEmoji(v.type)}</span>
                  {v.image&&<img src={v.image} alt="" style={{width:60,height:40,objectFit:"cover",borderRadius:5,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{v.year} {v.make} {v.model}</div>
                    <div style={{fontSize:11,color:T.muted}}>#{v.stock} · {v.location} · {v.mileage}</div>
                  </div>
                  <span style={{fontSize:14,fontWeight:700,color:T.accent,flexShrink:0}}>{fmtCur(v.price)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Ad Draft Modal */}
      {draftOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setDraftOpen(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:760,maxWidth:"100%",maxHeight:"94vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color:T.text}}>📝 {editPost?"EDIT AD DRAFT":"NEW AD DRAFT"}</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setDraftOpen(false)}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div>
                {/* Vehicle picker */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:6}}>Vehicle {draftV&&<span style={{color:T.accent}}>· {draftV.year} {draftV.make} {draftV.model}</span>}</div>
                  <input style={inp} placeholder="🔍 Search inventory to auto-fill…" value={draftSearch} onChange={e=>setDraftSearch(e.target.value)}/>
                  {draftSearch&&(
                    <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:9,maxHeight:180,overflowY:"auto",marginTop:6}}>
                      {srchV.length===0&&<div style={{padding:14,color:T.muted,fontSize:13}}>No matches.</div>}
                      {srchV.map((v,i)=>(
                        <div key={i} onClick={()=>{setDraftV(v);setDraftTitle(v.year+" "+v.make+" "+v.model);setDraftImg(v.image||"");setDraftText(buildAd(v,draftFeat,draftIntro));setDraftSearch("");}} style={{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${T.border}`,fontSize:13,display:"flex",gap:10,alignItems:"center"}}>
                          {v.image&&<img src={v.image} alt="" style={{width:50,height:34,objectFit:"cover",borderRadius:4,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                          <div><div style={{color:T.text,fontWeight:600}}>{v.year} {v.make} {v.model}</div><div style={{color:T.muted,fontSize:11}}>#{v.stock} · {fmtCur(v.price)} · {v.location}</div></div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {draftImg&&<img src={draftImg} alt="" style={{width:"100%",height:130,objectFit:"cover",borderRadius:10,marginBottom:12}} onError={e=>e.target.style.display="none"}/>}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Vehicle Features (one per line)</div>
                  <textarea style={{...inp,minHeight:110,fontSize:12,resize:"vertical"}} placeholder={"• All-Wheel Drive\n• Leather Interior\n• Heated Seats\n…"} value={draftFeat} onChange={e=>{setDraftFeat(e.target.value);if(draftV)setDraftText(buildAd(draftV,e.target.value,draftIntro));}}/>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Custom Opening (optional)</div>
                  <textarea style={{...inp,minHeight:70,fontSize:12,resize:"vertical"}} placeholder="Looking for a great SUV without breaking the bank?…" value={draftIntro} onChange={e=>{setDraftIntro(e.target.value);if(draftV)setDraftText(buildAd(draftV,draftFeat,e.target.value));}}/>
                </div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Ad Title</div>
                  <input style={inp} placeholder="2022 Ford F-150 XLT — HOC Airdrie" value={draftTitle} onChange={e=>setDraftTitle(e.target.value)}/>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <div style={{fontSize:11,color:T.muted}}>Ad Text (HOC Template)</div>
                  <span style={{fontSize:11,color:T.muted}}>{draftText.length} chars</span>
                </div>
                <textarea style={{...inp,flex:1,minHeight:430,fontSize:12,lineHeight:1.75,resize:"none"}} value={draftText} onChange={e=>setDraftText(e.target.value)} placeholder="Select a vehicle to auto-generate the HOC template."/>
              </div>
            </div>
            <div style={{...nInfo,marginTop:14,fontSize:12}}>
              📋 <strong>"Copy & Open Marketplace"</strong> copies your ad to clipboard and opens Facebook Marketplace. Paste and fill in vehicle details to publish.
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:14}}>
              <button style={{flex:2,background:"#34C759",color:"#fff",border:"none",borderRadius:9,padding:"11px 18px",fontFamily:"'DM Sans'",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={openMarketplace}>📋 Copy & Open Facebook Marketplace</button>
              <button style={{...btnS,flex:1}} onClick={()=>saveDraft("Draft")}>💾 Save Draft</button>
              <button style={btnS} onClick={()=>setDraftOpen(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Reset Password */}
      {resetTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setResetTarget(null)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:400,maxWidth:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>RESET PASSWORD</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setResetTarget(null)}>×</button>
            </div>
            <p style={{fontSize:13,color:T.muted,marginBottom:16,lineHeight:1.6}}>Set a new password for <strong style={{color:T.text}}>{resetTarget.first_name} {resetTarget.last_name}</strong>. Communicate it to them directly.</p>
            {resetMsg&&<div style={resetMsg.startsWith("✅")?nOk:nErr}>{resetMsg}</div>}
            <div style={{display:"grid",gap:12}}>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>New Password</div><input style={inp} type="password" placeholder="Min. 8 chars" value={resetPw} onChange={e=>{setResetPw(e.target.value);setResetMsg("");}}/></div>
              <button style={btnP} onClick={doResetPw}>Set New Password</button>
            </div>
          </div>
        </div>
      )}

      {/* Settings */}
      {settingsOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setSettingsOpen(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:500,maxWidth:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color:T.text}}>⚙️ SETTINGS</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setSettingsOpen(false)}>×</button>
            </div>
            <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Colour Theme</div>
            <p style={{fontSize:12,color:T.muted,marginBottom:16}}>Your theme saves to your account and works on any device.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:22}}>
              {Object.entries(THEMES).map(([key,t])=>(
                <button key={key} onClick={()=>saveTheme(key)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:themeKey===key?t.accent+"22":T.bg,border:`2px solid ${themeKey===key?t.accent:T.border}`,borderRadius:10,cursor:"pointer",fontFamily:"'DM Sans'",textAlign:"left",transition:"all .2s"}}>
                  <div style={{width:28,height:28,borderRadius:6,background:t.bg,border:`2px solid ${t.accent}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:t.accent}}></div>
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{t.name}</div>
                    <div style={{fontSize:10,color:T.muted}}>{t.accent}</div>
                  </div>
                  {themeKey===key&&<span style={{marginLeft:"auto",color:t.accent,fontSize:18}}>✓</span>}
                </button>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:16}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Your Account</div>
              <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:4}}>{user?.first_name} {user?.last_name}</div>
              <div style={{fontSize:12,color:T.muted,marginBottom:4}}>{user?.email}</div>
              <div style={{fontSize:12,color:T.muted}}>{user?.role} · {user?.location}</div>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
