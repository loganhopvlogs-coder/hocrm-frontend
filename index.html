function normalizeV(v,i){
  return {id:i+1,stock:v.stock||"HOC-"+i,year:v.year||0,make:v.make||"",model:v.model||"",
    price:v.price||0,mileage:v.mileage||"",location:v.location||"",type:v.bodyType||v.type||"",
    color:v.color||"",image:v.image||"",listingUrl:v.listingUrl||v.url||"",condition:v.condition||"Used"};
}

function buildAd(v, features, intro){
  const opening = intro||`Looking for a great ${v.type||"vehicle"} without breaking the bank? This ${v.year} ${v.make} ${v.model} delivers exactly that.`;
  const colorLine = v.color?` ${v.color} on ${v.color}`:"";
  const featBlock = features ? `\nLoaded with features including:\n${features}\n` : "\nLoaded with features including:\n• [Add features here]\n";
  return `${v.year} ${v.make} ${v.model}${colorLine} 🔥 Stock #${v.stock} ${v.mileage} ${fmtCur(v.price)} + GST

${opening}

Finished in ${v.color||"a great colour"}, this ${v.type||"vehicle"} brings sharp styling, smooth handling, and premium comfort — perfect for Alberta roads year-round.
${featBlock}
${v.mileage?v.mileage+" — p":"P"}riced aggressively at ${fmtCur(v.price)} + GST to reflect excellent value for the year and trim.

Financing available O.A.C. All credit types welcome — good, bad, rebuilding, or great.

AMVIC Licensed Dealer.

Message today to book a test drive before it's gone!

#HouseOfCars #${(v.make||"").replace(/\s/g,"")} #${(v.model||"").replace(/\s/g,"")} #UsedCars #Alberta #CarSales #HouseOfCars${(v.location||"").replace(/\s/g,"")}`;
}

// ─── Supabase image upload helper ────────────────────────────────
async function uploadVehiclePhoto(file, stock, userId) {
  const ext = file.name.split('.').pop();
  const path = `${stock}/${Date.now()}.${ext}`;
  const { data, error } = await sb.storage.from('vehicle-photos').upload(path, file, { upsert: true });
  if (error) throw error;
  const { data: urlData } = sb.storage.from('vehicle-photos').getPublicUrl(path);
  await sb.from('vehicle_photos').insert({ stock, url: urlData.publicUrl, uploaded_by: userId });
  return urlData.publicUrl;
}

  const handlePhotoUpload = async (e, stock) => {
    const files = Array.from(e.target.files);
    if(!files.length)return;
    setPhotoUploading(true);
    try{
      const urls=[];
      for(const file of files){
        // store directly in Supabase DB as URL after manual upload simulation
        // Since storage bucket may not exist, store the data URL for now
        const reader=new FileReader();
        const dataUrl=await new Promise(r=>{reader.onload=ev=>r(ev.target.result);reader.readAsDataURL(file);});
        const{data,error}=await sb.from("vehicle_photos").insert({stock,url:dataUrl,uploaded_by:user.id}).select().single();
        if(!error&&data)urls.push(data);
      }
      setVPhotos(prev=>{
        const existing=prev[stock]||[];
        return{...prev,[stock]:[...existing,...urls]};

          <div style={{background:T.accent,width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🚗</div>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:2,color:T.text}} className="desktop-only">HOUSE OF CARS</span>
          <span style={{color:T.accent,fontSize:10,fontWeight:700,background:T.accent+"22",padding:"2px 7px",borderRadius:4,border:`1px solid ${T.accent}44`}}>CRM</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {synced&&<span style={{fontSize:10,color:T.muted}} className="desktop-only">Synced {synced}</span>}

          {/* Chat button */}
          <button onClick={()=>setChatOpen(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.text,padding:4,position:"relative",display:"flex",alignItems:"center"}}>
            💬{unreadChat>0&&<span style={{position:"absolute",top:0,right:0,width:14,height:14,borderRadius:"50%",background:T.accent,color:"#fff",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadChat}</span>}
          </button>

          {/* Bell */}
          <div ref={notifRef} style={{position:"relative"}}>
            <button onClick={()=>setShowNotifs(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.text,padding:4,position:"relative",display:"flex",alignItems:"center"}}>
              🔔{unread>0&&<span style={{position:"absolute",top:0,right:0,width:14,height:14,borderRadius:"50%",background:"#E63946",color:"#fff",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
            </button>
            {showNotifs&&(
              <div style={{position:"absolute",right:0,top:36,width:320,background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,.5)",zIndex:999}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.text}}>Notifications</span>
                  {unread>0&&<button onClick={markAllRead} style={{background:"none",border:"none",color:T.accent,fontSize:11,cursor:"pointer",fontFamily:"'DM Sans'"}}>Mark all read</button>}
                </div>
                <div style={{maxHeight:280,overflowY:"auto"}}>
                  {notifs.length===0&&<div style={{padding:20,color:T.muted,fontSize:13,textAlign:"center"}}>No notifications</div>}
                  {notifs.map(n=>(
                    <div key={n.id} onClick={()=>{markRead(n.id);if(n.link_tab){setTab(n.link_tab);setShowNotifs(false);}}} style={{padding:"10px 16px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",background:n.read?"transparent":T.accent+"11",display:"flex",gap:8,alignItems:"flex-start"}}>
                      {!n.read&&<div style={{width:6,height:6,borderRadius:"50%",background:T.accent,marginTop:5,flexShrink:0}}></div>}
                      <div style={{flex:1}}><div style={{fontSize:12,color:T.text,lineHeight:1.5}}>{n.message}</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>{fmtTime(n.created_at)}</div></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <span style={{fontSize:11,color:T.muted}} className="desktop-only">{user?.first_name} {user?.last_name}</span>
          <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${T.accent},${T.accent}99)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>
            {(user?.first_name?.[0]||"")+(user?.last_name?.[0]||"")}
          </div>
          <button onClick={()=>{setEditName({first:user?.first_name||"",last:user?.last_name||""});setSettingsOpen(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:T.muted,padding:2}}>⚙️</button>
          <button style={{...btnS,fontSize:11,padding:"5px 10px"}} onClick={()=>{setScreen("login");setUser(null);setInv([]);setClients([]);setPosts([]);}}>Out</button>
        </div>
      </div>

      {/* ── Nav ── */}
      <div style={{background:T.nav,borderBottom:`1px solid ${T.border}`,padding:"0 10px",display:"flex",gap:1,flexShrink:0,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} className="tab-btn" style={{color:tab===t.id?T.text:T.muted,background:tab===t.id?"rgba(128,128,128,.15)":"none"}} onClick={()=>setTab(t.id)}>
            <span>{t.icon}</span>
            <span className="desktop-only">{t.label}</span>
            {t.badge>0&&<span style={{background:T.accent+"33",color:t.bc||T.accent,fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:8}}>{t.badge}</span>}
          </button>
        ))}
      </div>

      {/* ── Page content ── */}
      <div className="main-content" style={{flex:1,overflowY:"auto",padding:16}}>

        {/* ═══ DASHBOARD ═══ */}
        {tab==="dashboard"&&(
          <div className="fu">
            <h1 style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:2,marginBottom:2,color:T.text}}>GOOD {new Date().getHours()<12?"MORNING":new Date().getHours()<17?"AFTERNOON":"EVENING"}, {user?.first_name?.toUpperCase()}</h1>
            <p style={{fontSize:11,color:T.muted,marginBottom:16}}>{new Date().toLocaleDateString("en-CA",{weekday:"long",month:"long",day:"numeric"})}{user?.location&&" · "+user.location}</p>
            {invErr&&<div style={{...nErr,marginBottom:16}}>⚠️ {invErr} <button style={{...btnS,marginLeft:8,fontSize:11}} onClick={()=>loadInv()}>Retry</button></div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:10,marginBottom:16}}>
              {[{l:"Clients",v:visC.length,c:T.accent,t:"clients"},{l:"Hot",v:visC.filter(c=>c.status==="Hot Lead").length,c:"#FF3B30",t:"clients"},{l:"Pool",v:pool.length,c:"#FF9500",t:"pool"},{l:"Inventory",v:invLoad?"…":inv.length,c:"#0A84FF",t:"inventory"},{l:"Drafts",v:posts.filter(p=>p.status==="Draft").length,c:"#34C759",t:"drafts"}].map(s=>(
                <div key={s.l} style={{...card,cursor:"pointer",padding:14}} onClick={()=>setTab(s.t)}>
                  <div style={{fontSize:22,fontFamily:"'Bebas Neue'",color:s.c}}>{s.v}</div>
                  <div style={{fontSize:10,fontWeight:600,color:T.muted}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={card}>
                <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>🔥 Hot Leads</div>
                {visC.filter(c=>c.status==="Hot Lead"||c.status==="Hot").slice(0,5).map(c=>(
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}} onClick={()=>{setSelC(c);setTab("clients");}}>
                    <div><div style={{fontSize:13,fontWeight:600,color:T.text}}>{c.name}</div><div style={{fontSize:11,color:T.muted}}>{c.interested_in||"No vehicle"}</div></div>
                  </div>
                ))}
                {visC.filter(c=>c.status==="Hot Lead"||c.status==="Hot").length===0&&<p style={{fontSize:13,color:T.muted}}>No hot leads.</p>}
              </div>
              <div style={card}>
                <div style={{fontSize:11,fontWeight:700,color:"#0A84FF",marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>🚗 Latest Inventory</div>
                {inv.slice(0,5).map((v,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{v.year} {v.make} {v.model}</div>
                    <span style={{fontSize:12,fontWeight:700,color:T.accent}}>{fmtCur(v.price)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ═══ CLIENTS ═══ */}
        {tab==="clients"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:T.text}}>CLIENTS</h2>
                <p style={{fontSize:11,color:T.muted}}>{visC.length} contacts · {isAdmin?"All locations":isManager?"Your location":"Your leads"}</p>
              </div>
              <button style={btnP} onClick={()=>{setCf({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});setAddC(true);}}>+ Add Client</button>
            </div>
            {cMsg.t&&<div style={cMsg.type==="error"?nErr:nOk} className="fu">{cMsg.t}</div>}
            <input style={{...inp,marginBottom:12}} placeholder="🔍 Search clients…" value={cSearch} onChange={e=>setCSearch(e.target.value)}/>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:selC?"1fr 400px":"1fr",gap:14,alignItems:"start"}}>
              <div style={{...card,padding:0,overflow:"hidden"}}>
                {cLoad?<div style={{padding:20,color:T.muted,textAlign:"center"}}>Loading…</div>:
                filtC.length===0?<div style={{padding:24,color:T.muted,textAlign:"center"}}>{cSearch?"No matches.":"No clients yet!"}</div>:
                filtC.map(c=>{
                  const owner=isOwnerOrSP2(c);
                  return(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",borderBottom:`1px solid ${T.border}`,background:selC?.id===c.id?T.accent+"15":"transparent",borderLeft:selC?.id===c.id?`3px solid ${T.accent}`:"3px solid transparent"}} onClick={()=>setSelC(c)}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:T.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:T.accent,flexShrink:0}}>
                      {c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:13,fontWeight:600,color:T.text}}>{c.name}</span>
                        <span style={{padding:"1px 7px",borderRadius:20,fontSize:10,fontWeight:700,background:statusColor(c.status)+"22",color:statusColor(c.status),border:`1px solid ${statusColor(c.status)}44`}}>{statusIcon(c.status)} {c.status}</span>
                        {!owner&&<span style={{fontSize:9,color:T.muted,background:T.bg,border:`1px solid ${T.border}`,padding:"1px 5px",borderRadius:4}}>READ-ONLY</span>}
                      </div>
                      <div style={{fontSize:11,color:T.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.interested_in||"No vehicle"}</div>
                    </div>
                  </div>
                );})}
              </div>

              {selC&&(()=>{
                const owner=isOwnerOrSP2(selC);
                const sp2list=leadAccess.filter(a=>a.client_id===selC.id);
                return(
                <div style={{...card,position:"sticky",top:0,maxHeight:"calc(100vh - 140px)",overflowY:"auto"}} className="fu">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                    <div>
                      <h3 style={{fontSize:16,fontWeight:700,color:T.text}}>{selC.name}</h3>
                      <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                        <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:statusColor(selC.status),color:"#fff"}}>{statusIcon(selC.status)} {selC.status}</span>
                        {!owner&&<span style={{fontSize:10,color:"#FF9500",background:"rgba(255,149,0,.1)",border:"1px solid rgba(255,149,0,.3)",padding:"2px 8px",borderRadius:20}}>👁 Read-Only</span>}
                      </div>
                    </div>
                    <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:20}} onClick={()=>setSelC(null)}>×</button>
                  </div>

                  {/* Contact info — phone hidden for read-only */}
                  <div style={{display:"grid",gap:6,marginBottom:12}}>
                    {owner&&selC.phone&&<div style={{display:"flex",gap:8,fontSize:13,color:T.muted,alignItems:"center"}}><span>📞</span><a href={"tel:"+selC.phone} style={{color:T.muted,textDecoration:"none"}}>{selC.phone}</a></div>}
                    {!owner&&selC.phone&&<div style={{display:"flex",gap:8,fontSize:13,color:T.muted,alignItems:"center"}}><span>📞</span><span style={{color:T.muted,letterSpacing:2}}>●●●-●●●-●●●●</span></div>}
                    {selC.email&&<div style={{display:"flex",gap:8,fontSize:13,color:T.muted}}><span>✉️</span><a href={"mailto:"+selC.email} style={{color:T.muted,textDecoration:"none"}}>{selC.email}</a></div>}
                    {selC.location&&<div style={{display:"flex",gap:8,fontSize:13,color:T.muted}}><span>📍</span><span>{selC.location}</span></div>}
                    <div style={{display:"flex",gap:8,fontSize:11,color:T.muted}}><span>👤</span><span>{users.find(u=>u.id===selC.created_by)?.first_name||"Unknown"} · {selC.assigned_location}</span></div>
                  </div>

                  {/* Paired vehicle */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Paired Vehicle</div>
                    {selC.interested_in?(
                      <div style={{background:T.accent+"11",border:`1px solid ${T.accent}33`,borderRadius:9,padding:10}}>
                        <div style={{fontSize:13,fontWeight:700,color:T.text}}>{selC.interested_in}</div>
                        {selC.paired_vehicle_stock&&<div style={{fontSize:11,color:T.muted}}>Stock #{selC.paired_vehicle_stock}</div>}
                        {owner&&<div style={{display:"flex",gap:6,marginTop:8}}>
                          <button style={{...btnS,fontSize:11}} onClick={()=>{setVSearch("");setPairModal(selC);}}>Change</button>
                          <button style={{...btnS,fontSize:11}} onClick={()=>openDraft(inv.find(v=>v.stock===selC.paired_vehicle_stock)||null)}>📝 Ad</button>
                        </div>}
                      </div>
                    ):owner?<button style={{...btnS,width:"100%"}} onClick={()=>{setVSearch("");setPairModal(selC);}}>+ Pair a Vehicle</button>:<div style={{fontSize:12,color:T.muted}}>No vehicle paired.</div>}
                  </div>

                  {/* Sales Person 2 */}
                  {owner&&(
                    <div style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Sales Person 2</div>
                        <button style={{...btnS,fontSize:10,padding:"3px 8px"}} onClick={()=>setAddingSP2(s=>!s)}>+ Add</button>
                      </div>
                      {sp2list.length===0&&<div style={{fontSize:12,color:T.muted}}>No co-assignee yet.</div>}
                      {sp2list.map(a=>(
                        <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
                          <span style={{fontSize:12,color:T.text}}>{a.user?.first_name} {a.user?.last_name} <span style={{color:T.muted,fontSize:11}}>({a.user?.location})</span></span>
                          <button style={{...btnS,fontSize:10,color:"#E63946",padding:"2px 7px"}} onClick={()=>removeSP2(a.id,a.user?.first_name+" "+a.user?.last_name)}>Remove</button>
                        </div>
                      ))}
                      {addingSP2&&(
                        <div style={{marginTop:8}}>
                          <input style={{...inp,fontSize:12,marginBottom:6}} placeholder="Search rep by name…" value={sp2Search} onChange={e=>setSP2Search(e.target.value)} autoFocus/>
                          <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,maxHeight:140,overflowY:"auto"}}>
                            {users.filter(u=>u.id!==user.id&&u.status==="active"&&!sp2list.some(a=>a.user_id===u.id)&&(u.first_name+" "+u.last_name+" "+u.location).toLowerCase().includes(sp2Search.toLowerCase())).slice(0,6).map(u=>(
                              <div key={u.id} onClick={()=>addSP2(u)} style={{padding:"8px 12px",cursor:"pointer",borderBottom:`1px solid ${T.border}`,fontSize:12,color:T.text}}>
                                {u.first_name} {u.last_name} <span style={{color:T.muted}}>· {u.location} · {u.role}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Communication log */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Communication Log</div>
                    {owner&&(
                      <div style={{marginBottom:10}}>
                        <div style={{display:"flex",gap:5,marginBottom:6,flexWrap:"wrap"}}>
                          {LOG_TYPES.filter(l=>l.type!=="system"&&l.type!=="status").map(l=>(
                            <button key={l.type} onClick={()=>setLogType(l.type)} style={{...btnS,fontSize:11,padding:"4px 9px",background:logType===l.type?l.color+"22":"rgba(128,128,128,.08)",color:logType===l.type?l.color:T.muted,borderColor:logType===l.type?l.color+"44":T.border}}>{l.icon} {l.label}</button>
                          ))}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <input style={{...inp,flex:1,fontSize:12,padding:"8px 10px"}} placeholder={`Add ${LOG_TYPES.find(l=>l.type===logType)?.label||"entry"}…`} value={logText} onChange={e=>setLogText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLog()}/>
                          <button style={{...btnP,padding:"8px 12px",fontSize:12,flexShrink:0}} onClick={addLog} disabled={logLoading}>{logLoading?<span className="spin"></span>:"Add"}</button>
                        </div>
                      </div>
                    )}
                    <div style={{maxHeight:220,overflowY:"auto"}}>
                      {commLoad?<div style={{color:T.muted,fontSize:12}}>Loading…</div>:
                      commLog.length===0?<div style={{color:T.muted,fontSize:12}}>No activity yet.</div>:
                      commLog.map(entry=>(
                        <div key={entry.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:`1px solid ${T.border}`,alignItems:"flex-start"}}>
                          <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{logIcon(entry.type)}</span>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <span style={{fontSize:11,fontWeight:700,color:logColor(entry.type)}}>{LOG_TYPES.find(l=>l.type===entry.type)?.label||entry.type}</span>
                              <span style={{fontSize:10,color:T.muted}}>{fmtTime(entry.created_at)}</span>
                            </div>
                            <div style={{fontSize:12,color:T.text,marginTop:2,lineHeight:1.4}}>{entry.content}</div>
                            <div style={{fontSize:10,color:T.muted,marginTop:1}}>— {entry.author?.first_name||"System"} {entry.author?.last_name||""}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Lead Pool */}
                  {owner&&!pool.find(p=>p.client_id===selC.id)&&selC.created_by===user.id&&(
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Lead Pool</div>
                      <div style={{display:"grid",gap:6}}>
                        <textarea style={{...inp,minHeight:50,fontSize:12,resize:"none"}} placeholder="Optional note…" value={poolNote} onChange={e=>setPoolNote(e.target.value)}/>
                        <button style={{...btnS,color:"#FF9500",borderColor:"rgba(255,149,0,.4)"}} onClick={()=>addToPool(selC)}>🎯 Add to Lead Pool</button>
                      </div>
                    </div>
                  )}
                  {pool.find(p=>p.client_id===selC.id)&&<div style={{...nWarn,marginBottom:12,fontSize:12}}>🎯 In Lead Pool</div>}

                  {owner&&(
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <button style={{...btnP,flex:1,fontSize:12}} onClick={()=>{setCf({name:selC.name,phone:selC.phone||"",email:selC.email||"",location:selC.location||"",status:selC.status,notes:selC.notes||"",interested_in:selC.interested_in||"",paired_vehicle_stock:selC.paired_vehicle_stock||""});setEditC(true);}}>✏️ Edit</button>
                      <button style={{...btnS,color:"#E63946",fontSize:12}} onClick={()=>deleteClient(selC.id)}>🗑️</button>
                    </div>
                  )}
                </div>
                );
              })()}
            </div>
          </div>
        )}

        {/* ═══ LEAD POOL ═══ */}
        {tab==="pool"&&(
          <div className="fu">
            <h2 style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:T.text,marginBottom:4}}>LEAD POOL</h2>
            <p style={{fontSize:11,color:T.muted,marginBottom:16}}>{pool.length} available · Claim to take ownership</p>
            {poolMsg.t&&<div style={poolMsg.type==="error"?nErr:nOk} className="fu">{poolMsg.t}</div>}
            {poolLoad?<div style={{color:T.muted}}>Loading…</div>:
            pool.length===0?<div style={{...card,textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:10}}>🎯</div><div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:6}}>Pool is empty</div><p style={{fontSize:12,color:T.muted}}>When a rep drops a lead here you'll get notified.</p></div>:
            pool.map(item=>(
              <div key={item.id} style={{...card,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{fontSize:14,fontWeight:700,color:T.text}}>{item.client?.name}</div>
                      <span style={{padding:"1px 7px",borderRadius:20,fontSize:10,fontWeight:700,background:statusColor(item.client?.status)+"22",color:statusColor(item.client?.status)}}>{item.client?.status}</span>
                    </div>
                    {item.client?.email&&<div style={{fontSize:12,color:T.muted,marginBottom:2}}>✉️ {item.client.email}</div>}
                    {item.client?.interested_in&&<div style={{fontSize:12,color:T.muted,marginBottom:2}}>🚗 {item.client.interested_in}</div>}
                    {item.note&&<div style={{background:T.bg,borderRadius:7,padding:"6px 10px",marginTop:6,fontSize:12,color:T.muted}}>💬 "{item.note}"</div>}
                    <div style={{fontSize:11,color:T.muted,marginTop:6}}>{item.adder?.first_name} {item.adder?.last_name} ({item.adder?.location}) · {fmtDate(item.created_at)}</div>
                  </div>
                  {item.added_by!==user?.id?
                    <button style={{...btnP,fontSize:12,whiteSpace:"nowrap"}} onClick={()=>claimFromPool(item)}>🙋 Claim</button>:
                    <span style={{fontSize:11,color:T.muted,padding:"5px 10px",background:T.bg,borderRadius:6}}>Your lead</span>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ═══ INVENTORY ═══ */}
        {tab==="inventory"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>

                <h2 style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:T.text}}>LIVE INVENTORY</h2>
                <p style={{fontSize:11,color:T.muted}}>{invLoad?"Fetching…":filtInv.length+" of "+inv.length+(synced?" · "+synced:"")}</p>
              </div>
              <button style={{...btnP,display:"flex",alignItems:"center",gap:6,padding:"8px 14px",fontSize:12}} onClick={()=>loadInv(true)} disabled={syncing||invLoad}>
                {syncing?<><span className="spin"></span>Syncing…</>:"🔄 Sync"}
              </button>
            </div>
            {syncMsg.t&&<div style={syncMsg.type==="success"?nOk:nErr} className="fu">{syncMsg.t}</div>}
            <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:10,color:T.muted,fontWeight:700}}>SORT:</span>
              {[["price","💰"],["year","📅"],["mileage","🔢"],["make","🔤"]].map(([col,icon])=>(
                <button key={col} onClick={()=>toggleSort(col)} style={{...btnS,fontSize:11,padding:"4px 9px",background:iSort.col===col?T.accent+"22":"rgba(128,128,128,.08)",color:iSort.col===col?T.accent:T.muted,borderColor:iSort.col===col?T.accent+"44":T.border}}>
                  {icon} {col.charAt(0).toUpperCase()+col.slice(1)}{arr(col)}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <input style={{...inp,maxWidth:220,fontSize:12,padding:"7px 10px"}} placeholder="🔍 Stock #, make, model…" value={iSearch} onChange={e=>setISearch(e.target.value)}/>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {invTypes.map(t=><button key={t} onClick={()=>setIFilter(t)} style={{...btnS,fontSize:11,padding:"4px 9px",background:iFilter===t?T.accent:"rgba(128,128,128,.08)",color:iFilter===t?"#fff":T.muted,borderColor:iFilter===t?T.accent:T.border}}>{t}</button>)}
              </div>
              <select style={{...inp,width:"auto",minWidth:140,fontSize:12,padding:"6px 10px"}} value={iLoc} onChange={e=>setILoc(e.target.value)}>
                {invLocs.map(l=><option key={l}>{l==="All"?"All Locations":"📍 "+l}</option>)}
              </select>
            </div>
            {!invLoad&&(
              <div style={{...card,padding:0,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table className="inv-table" style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{background:T.bg}}>
                      {[["year","Year"],["make","Make"],["model","Model"],["price","Price"],["mileage","KM"],["color","Colour"],["location","Location"],["stock","Stock"]].map(([c,l])=>(
                        <th key={c} onClick={()=>toggleSort(c)} style={{color:iSort.col===c?T.accent:T.muted,borderBottomColor:T.border,padding:"9px 12px",textAlign:"left",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".7px",cursor:"pointer",whiteSpace:"nowrap"}}>{l}{arr(c)}</th>
                      ))}
                      <th style={{color:T.muted,borderBottomColor:T.border,padding:"9px 12px",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>Actions</th>
                    </tr></thead>
                    <tbody>
                      {filtInv.map((v,i)=>(
                        <tr key={i} style={{cursor:"pointer"}} onClick={()=>{setSelVehicle(v);loadVehiclePhotos([v.stock]);}}>
                          <td style={{fontWeight:700,borderBottomColor:T.border,color:T.text,padding:"9px 12px",fontSize:12}}>{v.year}</td>
                          <td style={{borderBottomColor:T.border,color:T.text,padding:"9px 12px",fontSize:12}}>{v.make}</td>
                          <td style={{borderBottomColor:T.border,color:T.text,padding:"9px 12px",fontSize:12}}>{v.model}</td>
                          <td style={{color:T.accent,fontWeight:700,borderBottomColor:T.border,padding:"9px 12px",fontSize:12}}>{fmtCur(v.price)}</td>
                          <td style={{color:T.muted,fontSize:11,borderBottomColor:T.border,padding:"9px 12px"}}>{v.mileage}</td>
                          <td style={{color:T.muted,fontSize:11,borderBottomColor:T.border,padding:"9px 12px"}}>{v.color||"—"}</td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}}><span style={{fontSize:10,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 6px",color:T.text}}>📍 {v.location}</span></td>
                          <td style={{fontFamily:"monospace",fontSize:10,color:T.muted,borderBottomColor:T.border,padding:"9px 12px"}}>{v.stock}</td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}} onClick={e=>e.stopPropagation()}>
                            <div style={{display:"flex",gap:5}}>
                              <button style={{...btnS,fontSize:11,padding:"3px 8px"}} onClick={()=>openDraft(v)}>📝</button>
                              {v.listingUrl&&<a href={v.listingUrl} target="_blank" rel="noopener noreferrer" style={{...btnS,fontSize:11,padding:"3px 8px",textDecoration:"none"}}>↗</a>}
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            {invLoad&&<div style={{color:T.muted,padding:20,textAlign:"center"}}>Loading inventory…</div>}
          </div>
        )}

        {/* ═══ AD DRAFTS ═══ */}
        {tab==="drafts"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:T.text}}>AD DRAFTS</h2>
                <p style={{fontSize:11,color:T.muted}}>{posts.length} total · {posts.filter(p=>p.status==="Draft").length} drafts</p>
              </div>
              <button style={btnP} onClick={()=>openDraft()}>+ New Draft</button>
            </div>
            {pMsg.t&&<div style={pMsg.type==="error"?nErr:nOk} className="fu">{pMsg.t}</div>}
            <div style={{...nInfo,marginBottom:16,fontSize:12,display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:18}}>📘</span>
              <div>All ads use the official HOC template. Features section is <strong>blank by default</strong> — fill in the actual features for each vehicle. Click <strong>"Copy & Open Marketplace"</strong> to post.</div>
            </div>
            {posts.length===0?<div style={{...card,textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:10}}>📝</div><button style={btnP} onClick={()=>openDraft()}>Create First Draft</button></div>:
            posts.map(p=>(
              <div key={p.id} style={{...card,marginBottom:12}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
                  {p.vehicle_image&&<img src={p.vehicle_image} alt="" style={{width:100,height:68,objectFit:"cover",borderRadius:7,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:3}}>{p.vehicle_title||"Untitled"}</div>
                        <div style={{fontSize:11,color:T.muted}}>{fmtDate(p.created_at)} · {users.find(u=>u.id===p.created_by)?.first_name}</div>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                        <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700,background:p.status==="Posted"?"rgba(52,199,89,.15)":"rgba(255,149,0,.15)",color:p.status==="Posted"?"#34C759":"#FF9500",border:"1px solid",borderColor:p.status==="Posted"?"rgba(52,199,89,.3)":"rgba(255,149,0,.3)"}}>{p.status}</span>
                        <button style={{...btnS,fontSize:11,padding:"3px 8px"}} onClick={()=>openDraft(null,p)}>✏️</button>
                        <button style={{...btnS,fontSize:11,padding:"3px 8px",color:"#E63946"}} onClick={async()=>{if(!window.confirm("Delete?"))return;await sb.from("posts").delete().eq("id",p.id);setPosts(x=>x.filter(y=>y.id!==p.id));}}>🗑️</button>
                      </div>
                    </div>
                  </div>
                </div>
                <pre style={{fontSize:11,color:T.muted,whiteSpace:"pre-wrap",fontFamily:"'DM Sans'",background:T.bg,borderRadius:8,padding:"10px 12px",maxHeight:120,overflow:"hidden",lineHeight:1.6}}>{p.draft_text}</pre>
                {p.status!=="Posted"&&<button style={{marginTop:10,background:"#34C759",color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontFamily:"'DM Sans'",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}} onClick={()=>{navigator.clipboard.writeText(p.draft_text).catch(()=>{});window.open("https://www.facebook.com/marketplace/create/vehicle","_blank");sb.from("posts").update({status:"Posted",posted_at:new Date().toISOString()}).eq("id",p.id).then(()=>loadPosts());}}>📋 Copy & Open Marketplace</button>}
              </div>
            ))}
          </div>
        )}

        {/* ═══ ACCOUNTS ═══ */}
        {tab==="accounts"&&isAdmin&&(
          <div className="fu">
            <h2 style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:T.text,marginBottom:4}}>ACCOUNTS</h2>
            <p style={{fontSize:11,color:T.muted,marginBottom:16}}>{users.length} users · Admin only</p>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:14,alignItems:"start"}}>
              <div style={{...card,padding:0,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{background:T.bg}}>
                      {["Name","Email","Location","Role","Status","Actions"].map(h=><th key={h} style={{color:T.muted,borderBottomColor:T.border,padding:"9px 12px",textAlign:"left",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".7px"}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {uLoad?<tr><td colSpan={6} style={{color:T.muted,textAlign:"center",padding:20,borderBottomColor:T.border}}>Loading…</td></tr>:
                      users.map((u,i)=>(
                        <tr key={i}>
                          <td style={{fontWeight:600,borderBottomColor:T.border,color:T.text,padding:"9px 12px",fontSize:12}}>{u.first_name} {u.last_name}{u.id===user?.id&&<span style={{fontSize:9,color:T.accent,background:T.accent+"22",padding:"1px 5px",borderRadius:4,marginLeft:4}}>You</span>}</td>
                          <td style={{fontSize:11,color:T.muted,fontFamily:"monospace",borderBottomColor:T.border,padding:"9px 12px"}}>{u.email}</td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}}><span style={{fontSize:10,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 6px",color:T.text}}>📍 {u.location}</span></td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}}><span style={{fontSize:10,fontWeight:700,color:u.role==="Admin"?"#E63946":u.role==="Manager"?"#FF9500":"#0A84FF"}}>{u.role}</span></td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}}><span style={{fontSize:11,fontWeight:700,color:u.status==="active"?"#34C759":"#E63946"}}>{u.status==="active"?"●":"●"}</span></td>
                          <td style={{borderBottomColor:T.border,padding:"9px 12px"}}>
                            {u.id!==user?.id&&<div style={{display:"flex",gap:5}}>
                              <button style={{...btnS,fontSize:10,padding:"3px 8px"}} onClick={()=>{setResetTarget(u);setResetPw("");setResetMsg("");}}>🔑</button>
                              <button style={{...btnS,fontSize:10,padding:"3px 8px",color:u.status==="active"?"#E63946":"#34C759"}} onClick={()=>toggleStatus(u)}>{u.status==="active"?"🚫":"✅"}</button>
                            </div>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={{...card,position:"sticky",top:0}}>
                <div style={{fontSize:10,fontWeight:700,color:T.accent,marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>🔐 Create Account</div>
                {rOk&&<div style={nOk}>✅ Account created!</div>}
                {rErr&&<div style={nErr}>⚠️ {rErr}</div>}
                <div style={{display:"grid",gap:9}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>First Name</div><input style={inp} value={rf.firstName} onChange={e=>{setRf(p=>({...p,firstName:e.target.value}));setRErr("");setROk(false);}}/></div>
                    <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>Last Name</div><input style={inp} value={rf.lastName} onChange={e=>{setRf(p=>({...p,lastName:e.target.value}));setRErr("");setROk(false);}}/></div>
                  </div>
                  <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>Email</div><input style={inp} placeholder="name@houseofcars.com" value={rf.email} onChange={e=>{setRf(p=>({...p,email:e.target.value}));setRErr("");setROk(false);}}/></div>
                  <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>Location</div><select style={inp} value={rf.location} onChange={e=>setRf(p=>({...p,location:e.target.value}))}><option value="">Select…</option>{LOCS.map(l=><option key={l}>{l}</option>)}</select></div>
                  <div><div style={{fontSize:10,color:T.muted,marginBottom:4}}>Role</div>
                    <div style={{display:"flex",gap:6}}>{["Sales","Manager","Admin"].map(r=><button key={r} onClick={()=>setRf(p=>({...p,role:r}))} style={{flex:1,background:rf.role===r?T.accent+"22":"rgba(128,128,128,.08)",color:rf.role===r?T.accent:T.muted,border:"1px solid",borderColor:rf.role===r?T.accent+"44":T.border,borderRadius:7,padding:"5px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{r}</button>)}</div>
                  </div>
                  <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>Password</div><input style={inp} type="password" placeholder="Min. 8 chars" value={rf.password} onChange={e=>setRf(p=>({...p,password:e.target.value}))}/></div>
                  <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>Confirm</div><input style={inp} type="password" value={rf.confirm} onChange={e=>setRf(p=>({...p,confirm:e.target.value}))}/></div>
                  <button style={{...btnP,display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontSize:12}} onClick={doRegister} disabled={rLoad}>{rLoad?<><span className="spin"></span>Creating…</>:"Create Account"}</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>{/* end content */}

      {/* ══ CHAT PANEL ══ */}
      {chatOpen&&(
        <div style={{position:"fixed",right:0,bottom:0,top:52,width:300,background:T.surface,borderLeft:`1px solid ${T.border}`,display:"flex",flexDirection:"column",zIndex:100,animation:"slideIn .2s ease"}}>
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>💬 {user?.location} Chat</div>
              <div style={{fontSize:10,color:T.muted}}>{onlineLoc.length} other reps at this location</div>
            </div>
            <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:18}} onClick={()=>setChatOpen(false)}>×</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
            {chatLoad?<div style={{color:T.muted,fontSize:12}}>Loading…</div>:
            chatMsgs.length===0?<div style={{color:T.muted,fontSize:12,textAlign:"center",marginTop:20}}>No messages yet. Say hi! 👋</div>:
            chatMsgs.map(m=>{
              const mine=m.user_id===user?.id;
              return(
                <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start"}}>
                  {!mine&&<div style={{fontSize:10,color:T.muted,marginBottom:2}}>{m.user_name}</div>}
                  <div style={{background:mine?T.accent:T.bg,color:mine?"#fff":T.text,borderRadius:mine?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 10px",maxWidth:"85%",fontSize:13,lineHeight:1.4}}>{m.message}</div>
                  <div style={{fontSize:9,color:T.muted,marginTop:2}}>{fmtTime(m.created_at)}</div>
                </div>
              );
            })}
            <div ref={chatEndRef}></div>
          </div>
          <div style={{padding:"8px 10px",borderTop:`1px solid ${T.border}`,display:"flex",gap:6,flexShrink:0}}>
            <input style={{...inp,flex:1,fontSize:12,padding:"8px 10px"}} placeholder="Message your team…" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
            <button style={{...btnP,padding:"8px 12px",fontSize:13,flexShrink:0}} onClick={sendChat}>➤</button>
          </div>
        </div>
      )}

      {/* ══ MODALS ══ */}

      {/* Add Client */}
      {addC&&(
        <div className="overlay-mobile" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setAddC(false)}>
          <div className="modal-inner" style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:560,maxWidth:"100%",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>ADD NEW CLIENT</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setAddC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:10}}>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Full Name *</div><input style={inp} value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Phone</div><input style={inp} placeholder="403-555-0000" value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Email</div><input style={inp} type="email" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Area</div><input style={inp} placeholder="e.g. Calgary NW" value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Status</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {STATUSES.map(s=><button key={s.label} onClick={()=>setCf(p=>({...p,status:s.label}))} style={{background:cf.status===s.label?s.color+"33":"rgba(128,128,128,.06)",color:cf.status===s.label?s.color:T.muted,border:`1px solid ${cf.status===s.label?s.color+"55":T.border}`,borderRadius:7,padding:"5px 4px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'",textAlign:"center"}}>{s.icon} {s.label}</button>)}
                </div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Interested In</div>
                <select style={inp} value={cf.interested_in} onChange={e=>{const v=inv.find(x=>x.year+" "+x.make+" "+x.model===e.target.value);setCf(p=>({...p,interested_in:e.target.value,paired_vehicle_stock:v?.stock||""}));}}>
                  <option value="">Select a vehicle…</option>
                  {inv.slice(0,150).map((v,i)=><option key={i} value={v.year+" "+v.make+" "+v.model}>{v.year} {v.make} {v.model} — {fmtCur(v.price)} · {v.location}</option>)}
                </select>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Notes</div><textarea style={{...inp,minHeight:70,resize:"vertical"}} value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button style={btnP} onClick={saveClient}>Save Client</button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Client */}
      {editC&&(
        <div className="overlay-mobile" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setEditC(false)}>
          <div className="modal-inner" style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:520,maxWidth:"100%",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>EDIT CLIENT</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setEditC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:10}}>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Full Name *</div><input style={inp} value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Phone</div><input style={inp} value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Email</div><input style={inp} type="email" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Area</div><input style={inp} value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Status</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {STATUSES.map(s=><button key={s.label} onClick={()=>setCf(p=>({...p,status:s.label}))} style={{background:cf.status===s.label?s.color+"33":"rgba(128,128,128,.06)",color:cf.status===s.label?s.color:T.muted,border:`1px solid ${cf.status===s.label?s.color+"55":T.border}`,borderRadius:7,padding:"5px 4px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'",textAlign:"center"}}>{s.icon} {s.label}</button>)}
                </div>
              </div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Notes</div><textarea style={{...inp,minHeight:70,resize:"vertical"}} value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button style={btnP} onClick={updateClient}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* Pair Vehicle */}
      {pairModal&&(
        <div className="overlay-mobile" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>{setPairModal(null);setVSearch("");}}>
          <div className="modal-inner" style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:580,maxWidth:"100%",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:2,color:T.text}}>PAIR VEHICLE — {pairModal.name?.toUpperCase()}</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>{setPairModal(null);setVSearch("");}}>×</button>
            </div>
            <input style={{...inp,marginBottom:10}} placeholder="🔍 Stock #, make, model, year…" value={vSearch} onChange={e=>setVSearch(e.target.value)} autoFocus/>
            <div style={{display:"grid",gap:7,maxHeight:420,overflowY:"auto"}}>
              {srchV.map((v,i)=>(
                <div key={i} onClick={()=>pairVehicle(pairModal,v)} style={{display:"flex",alignItems:"center",gap:10,background:pairModal.paired_vehicle_stock===v.stock?T.accent+"22":T.bg,border:`1px solid ${pairModal.paired_vehicle_stock===v.stock?T.accent:T.border}`,borderRadius:9,padding:"10px 12px",cursor:"pointer"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{typeEmoji(v.type)}</span>
                  {v.image&&<img src={v.image} alt="" style={{width:54,height:36,objectFit:"cover",borderRadius:4,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{v.year} {v.make} {v.model}</div>
                    <div style={{fontSize:11,color:T.muted}}>#{v.stock} · {v.location} · {v.mileage}</div>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:T.accent,flexShrink:0}}>{fmtCur(v.price)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Vehicle Profile / Photo Upload */}
      {selVehicle&&(
        <div className="overlay-mobile" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setSelVehicle(null)}>
          <div className="modal-inner" style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:620,maxWidth:"100%",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>{selVehicle.year} {selVehicle.make} {selVehicle.model}</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setSelVehicle(null)}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14,fontSize:13}}>
              {[["Stock #",selVehicle.stock],["Price",fmtCur(selVehicle.price)+" + GST"],["Year",selVehicle.year],["Make",selVehicle.make],["Model",selVehicle.model],["KM",selVehicle.mileage],["Colour",selVehicle.color||"—"],["Location","📍 "+selVehicle.location],["Type",selVehicle.type||"—"],["Condition",selVehicle.condition]].map(([k,v])=>(
                <div key={k} style={{background:T.bg,borderRadius:7,padding:"7px 10px"}}>
                  <div style={{fontSize:10,color:T.muted,marginBottom:2}}>{k}</div>
                  <div style={{fontSize:13,fontWeight:600,color:T.text}}>{v}</div>
                </div>
              ))}
            </div>

            {/* Photos */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Vehicle Photos</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                {selVehicle.image&&<img src={selVehicle.image} alt="" style={{width:120,height:80,objectFit:"cover",borderRadius:7}} onError={e=>e.target.style.display="none"}/>}
                {(vPhotos[selVehicle.stock]||[]).map((p,i)=>(
                  <img key={i} src={p.url} alt="" style={{width:120,height:80,objectFit:"cover",borderRadius:7}} onError={e=>e.target.style.display="none"}/>
                ))}
              </div>
              <label style={{...btnS,display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12}}>
                {photoUploading?<><span className="spin"></span>Uploading…</>:"📷 Upload Photos"}
                <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handlePhotoUpload(e,selVehicle.stock)} disabled={photoUploading}/>
              </label>
              <div style={{fontSize:11,color:T.muted,marginTop:6}}>Photos are shared with all reps and available when drafting ads.</div>
            </div>

            <div style={{display:"flex",gap:8}}>
              <button style={btnP} onClick={()=>{setSelVehicle(null);openDraft(selVehicle);}}>📝 Draft Ad</button>
              {selVehicle.listingUrl&&<a href={selVehicle.listingUrl} target="_blank" rel="noopener noreferrer" style={{...btnS,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}>↗ View Listing</a>}
            </div>
          </div>
        </div>
      )}

      {/* Ad Draft Modal */}
      {draftOpen&&(
        <div className="overlay-mobile" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setDraftOpen(false)}>
          <div className="modal-inner" style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:760,maxWidth:"100%",maxHeight:"94vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>📝 {editPost?"EDIT DRAFT":"NEW AD DRAFT"}</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setDraftOpen(false)}>×</button>
            </div>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:5}}>Vehicle {draftV&&<span style={{color:T.accent}}>· {draftV.year} {draftV.make} {draftV.model}</span>}</div>
                  <input style={inp} placeholder="🔍 Stock #, make, model…" value={draftSearch} onChange={e=>setDraftSearch(e.target.value)}/>
                  {draftSearch&&(
                    <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,maxHeight:180,overflowY:"auto",marginTop:6}}>
                      {srchV.map((v,i)=>(
                        <div key={i} onClick={()=>{setDraftV(v);setDraftTitle(v.year+" "+v.make+" "+v.model);setDraftImg(v.image||(vPhotos[v.stock]?.[0]?.url)||"");setDraftText(buildAd(v,draftFeat,draftIntro));setDraftSearch("");}} style={{padding:"9px 12px",cursor:"pointer",borderBottom:`1px solid ${T.border}`,fontSize:12,display:"flex",gap:8,alignItems:"center"}}>
                          {(v.image||vPhotos[v.stock]?.[0]?.url)&&<img src={v.image||vPhotos[v.stock]?.[0]?.url} alt="" style={{width:46,height:30,objectFit:"cover",borderRadius:4,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                          <div><div style={{color:T.text,fontWeight:600}}>{v.year} {v.make} {v.model}</div><div style={{color:T.muted,fontSize:10}}>#{v.stock} · {fmtCur(v.price)} · {v.location}</div></div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {draftImg&&<img src={draftImg} alt="" style={{width:"100%",height:120,objectFit:"cover",borderRadius:9,marginBottom:10}} onError={e=>e.target.style.display="none"}/>}
                <div style={{marginBottom:9}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Vehicle Features <span style={{color:"#FF9500"}}>(fill in actual features!)</span></div>
                  <textarea style={{...inp,minHeight:120,fontSize:12,resize:"vertical"}} placeholder={"• [Enter the actual features]\n• Heated Seats\n• Backup Camera\n• …"} value={draftFeat} onChange={e=>{setDraftFeat(e.target.value);if(draftV)setDraftText(buildAd(draftV,e.target.value,draftIntro));}}/>
                </div>
                <div style={{marginBottom:9}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Custom Opening (optional)</div>
                  <textarea style={{...inp,minHeight:60,fontSize:12,resize:"vertical"}} placeholder="Looking for the perfect truck for Alberta winters?…" value={draftIntro} onChange={e=>{setDraftIntro(e.target.value);if(draftV)setDraftText(buildAd(draftV,draftFeat,e.target.value));}}/>
                </div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:4}}>Ad Title</div><input style={inp} placeholder="2022 Ford F-150 — HOC Airdrie" value={draftTitle} onChange={e=>setDraftTitle(e.target.value)}/></div>
              </div>
              <div style={{display:"flex",flexDirection:"column"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{fontSize:11,color:T.muted}}>Ad Text (HOC Template)</div>
                  <span style={{fontSize:10,color:T.muted}}>{draftText.length} chars</span>
                </div>
                <textarea style={{...inp,flex:1,minHeight:420,fontSize:12,lineHeight:1.75,resize:"none"}} value={draftText} onChange={e=>setDraftText(e.target.value)} placeholder="Select a vehicle to generate the HOC template."/>
              </div>
            </div>
            <div style={{...nInfo,marginTop:12,fontSize:12}}>📋 "Copy & Open Marketplace" copies your ad and opens Facebook Marketplace. Paste and fill in vehicle details.</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
              <button style={{flex:2,background:"#34C759",color:"#fff",border:"none",borderRadius:9,padding:"11px 16px",fontFamily:"'DM Sans'",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}} onClick={openMarketplace}>📋 Copy & Open Marketplace</button>
              <button style={{...btnS,flex:1}} onClick={()=>saveDraft("Draft")}>💾 Save Draft</button>
              <button style={btnS} onClick={()=>setDraftOpen(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Reset Password */}
      {resetTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setResetTarget(null)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:380,maxWidth:"100%"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:2,color:T.text,marginBottom:12}}>RESET PASSWORD</h3>
            <p style={{fontSize:13,color:T.muted,marginBottom:14}}>Set new password for <strong style={{color:T.text}}>{resetTarget.first_name} {resetTarget.last_name}</strong>. Tell them directly.</p>
            {resetMsg&&<div style={resetMsg.startsWith("✅")?nOk:nErr}>{resetMsg}</div>}
            <div style={{display:"grid",gap:10}}>
              <input style={inp} type="password" placeholder="Min. 8 chars" value={resetPw} onChange={e=>{setResetPw(e.target.value);setResetMsg("");}}/>
              <button style={btnP} onClick={doResetPw}>Set New Password</button>
            </div>
          </div>
        </div>
      )}

      {/* Settings */}
      {settingsOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setSettingsOpen(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:18,padding:24,width:520,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:T.text}}>⚙️ SETTINGS</h3>
              <button style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:22}} onClick={()=>setSettingsOpen(false)}>×</button>
            </div>

            {/* Edit Name */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Your Name</div>
              {nameMsg&&<div style={nameMsg.startsWith("✅")?{...nOk,marginBottom:10}:{...nErr,marginBottom:10}}>{nameMsg}</div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>First Name</div><input style={inp} value={editName.first} onChange={e=>setEditName(p=>({...p,first:e.target.value}))} placeholder={user?.first_name}/></div>
                <div><div style={{fontSize:11,color:T.muted,marginBottom:3}}>Last Name</div><input style={inp} value={editName.last} onChange={e=>setEditName(p=>({...p,last:e.target.value}))} placeholder={user?.last_name}/></div>
              </div>
              <button style={{...btnP,fontSize:12,padding:"8px 14px"}} onClick={saveProfile}>Save Name</button>
            </div>

            {/* Theme presets */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Colour Theme</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {Object.entries(THEMES).map(([key,t])=>(
                  <button key={key} onClick={()=>applyTheme(key,customAccent&&customAccent!==THEMES[key].accent?customAccent:"")} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",background:themeKey===key?t.accent+"22":T.bg,border:`2px solid ${themeKey===key?t.accent:T.border}`,borderRadius:9,cursor:"pointer",fontFamily:"'DM Sans'",textAlign:"left"}}>
                    <div style={{width:24,height:24,borderRadius:6,background:t.bg,border:`2px solid ${t.accent}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:t.accent}}></div>
                    </div>
                    <div style={{fontSize:12,fontWeight:600,color:T.text}}>{t.name}</div>
                    {themeKey===key&&<span style={{marginLeft:"auto",color:t.accent,fontSize:16}}>✓</span>}
                  </button>
                ))}
              </div>

              {/* Custom accent colour */}
              <div>
                <div style={{fontSize:11,color:T.muted,marginBottom:6}}>Custom Accent Colour</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="color" value={accentInput} onChange={e=>setAccentInput(e.target.value)} style={{width:44,height:36,borderRadius:7,border:`1px solid ${T.border}`,background:"none",cursor:"pointer",padding:2}}/>
                  <input style={{...inp,flex:1,fontFamily:"monospace",fontSize:12}} placeholder="#E63946" value={accentInput} onChange={e=>setAccentInput(e.target.value)}/>
                  <button style={{...btnP,padding:"8px 14px",fontSize:12,flexShrink:0}} onClick={()=>applyTheme(themeKey,accentInput)}>Apply</button>
                </div>
                <div style={{fontSize:11,color:T.muted,marginTop:5}}>Pick any hex colour. Works on top of any theme preset.</div>
              </div>
            </div>

            {/* Account info */}
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:14}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Account</div>
              <div style={{fontSize:14,fontWeight:600,color:T.text}}>{user?.first_name} {user?.last_name}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>{user?.email}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>{user?.role} · {user?.location}</div>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
