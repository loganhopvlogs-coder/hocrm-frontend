<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House of Cars — CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0F;font-family:'DM Sans',sans-serif;color:#E8E8F0}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px}
.tab-btn{background:none;border:none;color:#555;cursor:pointer;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn:hover{color:#ccc;background:rgba(255,255,255,.05)}.tab-btn.active{color:#fff;background:rgba(255,255,255,.1)}
.card{background:#13131A;border:1px solid #1E1E2A;border-radius:14px;padding:20px}
.btn-red{background:#E63946;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-red:hover{background:#c8303c;transform:translateY(-1px)}.btn-red:disabled{opacity:.5;cursor:default;transform:none}
.btn-sm{background:rgba(255,255,255,.07);color:#bbb;border:1px solid #2a2a38;border-radius:7px;padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s}
.btn-sm:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-green{background:#34C759;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-green:hover{background:#28a745;transform:translateY(-1px)}
.inp{background:#16161f;border:1px solid #252535;border-radius:9px;color:#e8e8f0;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:#E63946}.inp::placeholder{color:#444}
select.inp{cursor:pointer}textarea.inp{resize:vertical;min-height:100px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#13131A;border:1px solid #252535;border-radius:18px;padding:28px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto}
.lead-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #14141e}
.lead-row:hover{background:rgba(255,255,255,.03)}.lead-row.sel{background:rgba(230,57,70,.09);border-left:3px solid #E63946}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(230,57,70,.15) 0%,transparent 60%),#0A0A0F;padding:24px}
.auth-box{background:#111118;border:1px solid #1E1E2A;border-radius:22px;padding:40px 36px;width:420px;max-width:100%}
.tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(230,57,70,.14);color:#E63946;border:1px solid rgba(230,57,70,.28)}
.skeleton{background:linear-gradient(90deg,#1a1a24 25%,#222230 50%,#1a1a24 75%);background-size:1000px 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:14px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid #1E1E2A;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#aaa}td{padding:10px 14px;font-size:13px;border-bottom:1px solid #12121c;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.018)}
.notice{border-radius:10px;padding:11px 16px;font-size:13px;margin-bottom:14px}
.notice.success{background:rgba(52,199,89,.1);border:1px solid rgba(52,199,89,.3);color:#34C759}
.notice.error{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#E63946}
.notice.warn{background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);color:#FF9500}
.notice.info{background:rgba(10,132,255,.1);border:1px solid rgba(10,132,255,.3);color:#4da3ff}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;flex-shrink:0}
.fu{animation:fadeUp .3s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SUPA_URL = "https://dmeigygmmxwmkyniizzj.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZWlneWdtbXh3bWt5bmlpenpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzU2NDEsImV4cCI6MjA4ODE1MTY0MX0.hTv4RICUBNWFNLsQEaZVqcbviqD0ZZSinwCzdSLRDJo";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
const INVENTORY_URL = "https://hocrm-backend.onrender.com/inventory";
const ALLOWED_DOMAINS = ["houseofcarscalgary.com","houseofcars.com"];
const HOC_LOCATIONS = ["52 Street","Airdrie","Barlow Trail","Chinook","Cochrane","Deerfoot Meadows","MacLeod Trail","McKnight Blvd","Olympic Park","Edmonton","Lethbridge","Medicine Hat"];
const STATUS_C = {Hot:{bg:"#E63946",text:"#fff"},Warm:{bg:"#FF9500",text:"#fff"},Cold:{bg:"#555",text:"#fff"}};
const typeEmoji = t=>({Truck:"🛻",SUV:"🚙",Sedan:"🚗",Van:"🚐"}[t]||"🚗");
const fmtCur = n=>n?"$"+Number(n).toLocaleString():"—";
const fmtDate = d=>d?new Date(d).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"}):"—";

function normalizeVehicle(v,i){
  return {id:i+1,stock:v.stock||"HOC-"+i,vin:v.vin||"",year:v.year||0,make:v.make||"",model:v.model||"",
    price:v.price||0,mileage:v.mileage||"",location:v.location||"",type:v.bodyType||v.type||"",
    color:v.color||"",image:v.image||"",listingUrl:v.listingUrl||v.url||"",condition:v.condition||"Used"};
}

function App(){
  // ── Auth ──────────────────────────────────────────────────────
  const [screen,setScreen]   = useState("login");
  const [user,setUser]       = useState(null);
  const [tab,setTab]         = useState("dashboard");
  const [lf,setLf]           = useState({email:"",password:""});
  const [sf,setSf]           = useState({firstName:"",lastName:"",email:"",location:"",role:"Sales",password:"",confirm:""});
  const [forgotEmail,setForgotEmail] = useState("");
  const [authErr,setAuthErr] = useState("");
  const [authMsg,setAuthMsg] = useState("");
  const [authLoad,setAuthLoad] = useState(false);
  const [showPw,setShowPw]   = useState(false);

  // ── Inventory ─────────────────────────────────────────────────
  const [inv,setInv]         = useState([]);
  const [invLoad,setInvLoad] = useState(false);
  const [invErr,setInvErr]   = useState("");
  const [synced,setSynced]   = useState(null);
  const [syncing,setSyncing] = useState(false);
  const [syncMsg,setSyncMsg] = useState({t:"",type:""});
  const [iFilter,setIFilter] = useState("All");
  const [iLoc,setILoc]       = useState("All");
  const [iSort,setISort]     = useState({col:"year",dir:"desc"});

  // ── Clients ───────────────────────────────────────────────────
  const [clients,setClients]     = useState([]);
  const [cLoad,setCLoad]         = useState(false);
  const [selC,setSelC]           = useState(null);
  const [addC,setAddC]           = useState(false);
  const [editC,setEditC]         = useState(false);
  const [cf,setCf]               = useState({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});
  const [pairModal,setPairModal] = useState(null);
  const [cMsg,setCMsg]           = useState({t:"",type:""});
  const [cSearch,setCSearch]     = useState("");

  // ── Posts ─────────────────────────────────────────────────────
  const [posts,setPosts]     = useState([]);
  const [pLoad,setPLoad]     = useState(false);
  const [draftOpen,setDraftOpen]   = useState(false);
  const [draftV,setDraftV]         = useState(null);
  const [draftTitle,setDraftTitle] = useState("");
  const [draftText,setDraftText]   = useState("");
  const [vSearch,setVSearch]       = useState("");
  const [pMsg,setPMsg]             = useState({t:"",type:""});
  const [editPost,setEditPost]     = useState(null);

  // ── Accounts ──────────────────────────────────────────────────
  const [users,setUsers]     = useState([]);
  const [uLoad,setULoad]     = useState(false);
  const [rf,setRf]           = useState({firstName:"",lastName:"",email:"",location:"",role:"Sales",password:"",confirm:""});
  const [rErr,setRErr]       = useState("");
  const [rOk,setROk]         = useState(false);
  const [rLoad,setRLoad]     = useState(false);

  // ── Data loaders ──────────────────────────────────────────────
  const loadInv = async(force=false)=>{
    if(force){setSyncing(true);setSyncMsg({t:"",type:""});}
    else{setInvLoad(true);setInvErr("");}
    try{
      const r=await fetch(INVENTORY_URL);
      if(!r.ok)throw new Error("API error "+r.status);
      const j=await r.json();
      if(!j.success)throw new Error(j.error||"Backend error");
      if(!j.vehicles?.length)throw new Error("No vehicles — re-run your Apify scraper.");
      setInv(j.vehicles.map(normalizeVehicle));
      setSynced(new Date().toLocaleTimeString("en-CA",{hour:"2-digit",minute:"2-digit"}));
      if(force)setSyncMsg({t:"✅ Synced! "+j.vehicles.length+" vehicles loaded.",type:"success"});
    }catch(e){
      if(force)setSyncMsg({t:"❌ "+e.message,type:"error"});
      else setInvErr(e.message);
    }finally{
      setInvLoad(false);setSyncing(false);
      if(force)setTimeout(()=>setSyncMsg({t:"",type:""}),5000);
    }
  };

  const loadClients = async()=>{
    setCLoad(true);
    const {data}=await sb.from("clients").select("*").order("created_at",{ascending:false});
    if(data)setClients(data);
    setCLoad(false);
  };

  const loadPosts = async()=>{
    setPLoad(true);
    const {data}=await sb.from("posts").select("*").order("created_at",{ascending:false});
    if(data)setPosts(data);
    setPLoad(false);
  };

  const loadUsers = async()=>{
    setULoad(true);
    const {data}=await sb.from("users").select("id,email,first_name,last_name,location,role,created_at");
    if(data)setUsers(data);
    setULoad(false);
  };

  useEffect(()=>{
    if(screen==="app"){loadInv();loadClients();loadPosts();loadUsers();}
  },[screen]);

  // ── Auth handlers ─────────────────────────────────────────────
  const doLogin=async()=>{
    setAuthErr("");setAuthLoad(true);
    const {data,error}=await sb.from("users").select("*").eq("email",lf.email.toLowerCase().trim()).single();
    if(error||!data){setAuthErr("No account found with that email.");setAuthLoad(false);return;}
    if(data.password_hash!==lf.password){setAuthErr("Incorrect password.");setAuthLoad(false);return;}
    setUser(data);setScreen("app");setAuthLoad(false);
  };

  const doSignup=async()=>{
    setAuthErr("");
    const {firstName,lastName,email,password,confirm,location}=sf;
    if(!firstName||!lastName||!email||!password||!location){setAuthErr("Please fill in all required fields.");return;}
    const domain=email.split("@")[1]?.toLowerCase();
    if(!ALLOWED_DOMAINS.includes(domain)){setAuthErr("Sorry — only @houseofcars.com and @houseofcarscalgary.com accounts are allowed.");return;}
    if(password.length<8){setAuthErr("Password must be at least 8 characters.");return;}
    if(password!==confirm){setAuthErr("Passwords do not match.");return;}
    setAuthLoad(true);
    const {data:ex}=await sb.from("users").select("id").eq("email",email.toLowerCase()).single();
    if(ex){setAuthErr("An account with this email already exists.");setAuthLoad(false);return;}
    const {data,error}=await sb.from("users").insert({email:email.toLowerCase().trim(),first_name:firstName,last_name:lastName,location,role:sf.role,password_hash:password}).select().single();
    if(error){setAuthErr("Error creating account: "+error.message);setAuthLoad(false);return;}
    setUser(data);setScreen("app");setAuthLoad(false);
  };

  const doForgot=()=>{
    setAuthErr("");setAuthMsg("");
    if(!forgotEmail){setAuthErr("Please enter your email.");return;}
    setAuthMsg("Please contact your administrator to reset your password.");
  };

  // ── Client CRUD ───────────────────────────────────────────────
  const saveClient=async()=>{
    if(!cf.name){setCMsg({t:"Name is required.",type:"error"});return;}
    const {data,error}=await sb.from("clients").insert({...cf,created_by:user.id,last_contact:new Date().toISOString()}).select().single();
    if(error){setCMsg({t:"Error: "+error.message,type:"error"});return;}
    setClients(p=>[data,...p]);
    setAddC(false);
    setCf({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});
    setCMsg({t:"✅ Client saved!",type:"success"});
    setTimeout(()=>setCMsg({t:"",type:""}),3000);
  };

  const updateClient=async()=>{
    const {data,error}=await sb.from("clients").update(cf).eq("id",selC.id).select().single();
    if(error){setCMsg({t:"Error: "+error.message,type:"error"});return;}
    setClients(p=>p.map(c=>c.id===data.id?data:c));
    setSelC(data);setEditC(false);
    setCMsg({t:"✅ Client updated!",type:"success"});
    setTimeout(()=>setCMsg({t:"",type:""}),3000);
  };

  const deleteClient=async(id)=>{
    if(!window.confirm("Delete this client? This cannot be undone."))return;
    await sb.from("clients").delete().eq("id",id);
    setClients(p=>p.filter(c=>c.id!==id));
    setSelC(null);
  };

  const pairVehicle=async(client,vehicle)=>{
    const {data,error}=await sb.from("clients").update({interested_in:vehicle.year+" "+vehicle.make+" "+vehicle.model,paired_vehicle_stock:vehicle.stock}).eq("id",client.id).select().single();
    if(!error&&data){setClients(p=>p.map(c=>c.id===data.id?data:c));setSelC(data);}
    setPairModal(null);setCSearch("");
  };

  // ── Ad Draft helpers ──────────────────────────────────────────
  const buildDraftText=(v)=>
    "🚗 "+v.year+" "+v.make+" "+v.model+" | "+fmtCur(v.price)+"\n\n"+
    "📍 "+v.location+"\n"+
    "🔢 "+v.mileage+" | Stock #"+v.stock+(v.color?" | "+v.color:"")+"\n\n"+
    "This "+v.condition+" "+v.year+" "+v.make+" "+v.model+" is ready for its new home!\n\n"+
    "✅ Competitively priced at "+fmtCur(v.price)+"\n"+
    "✅ "+v.mileage+" on the clock\n"+
    "✅ Available at House of Cars "+v.location+"\n\n"+
    "📞 Call or message us to book a test drive!\n\n"+
    "#HouseOfCars #"+(v.make||"").replace(/\s/g,"")+" #"+(v.model||"").replace(/\s/g,"")+" #UsedCars #Alberta #CarSales";

  const openDraft=(vehicle=null,post=null)=>{
    if(post){
      setEditPost(post);
      setDraftTitle(post.vehicle_title||"");
      setDraftText(post.draft_text||"");
      setDraftV(inv.find(v=>v.stock===post.vehicle_stock)||null);
    } else {
      setEditPost(null);
      setDraftV(vehicle);
      setDraftTitle(vehicle?vehicle.year+" "+vehicle.make+" "+vehicle.model:"");
      setDraftText(vehicle?buildDraftText(vehicle):"");
    }
    setVSearch("");
    setDraftOpen(true);
  };

  const saveDraft=async(status="Draft")=>{
    if(!draftText){setPMsg({t:"Please write your ad text first.",type:"error"});return;}
    const payload={vehicle_stock:draftV?.stock||null,vehicle_title:draftTitle,draft_text:draftText,status,created_by:user.id,posted_at:status==="Posted"?new Date().toISOString():null};
    if(editPost){
      const {data,error}=await sb.from("posts").update(payload).eq("id",editPost.id).select().single();
      if(error){setPMsg({t:"Error: "+error.message,type:"error"});return;}
      setPosts(p=>p.map(x=>x.id===data.id?data:x));
    } else {
      const {data,error}=await sb.from("posts").insert(payload).select().single();
      if(error){setPMsg({t:"Error: "+error.message,type:"error"});return;}
      setPosts(p=>[data,...p]);
    }
    setDraftOpen(false);
    setPMsg({t:status==="Draft"?"✅ Draft saved!":"✅ Marked as posted!",type:"success"});
    setTimeout(()=>setPMsg({t:"",type:""}),4000);
  };

  const openMarketplace=()=>{
    navigator.clipboard.writeText(draftText).catch(()=>{});
    window.open("https://www.facebook.com/marketplace/create/vehicle","_blank");
    saveDraft("Posted");
  };

  const deletePost=async(id)=>{
    if(!window.confirm("Delete this draft?"))return;
    await sb.from("posts").delete().eq("id",id);
    setPosts(p=>p.filter(x=>x.id!==id));
  };

  // ── Register user ─────────────────────────────────────────────
  const doRegister=async()=>{
    setRErr("");setROk(false);
    const {firstName,lastName,email,password,confirm,location}=rf;
    if(!firstName||!lastName||!email||!password||!location){setRErr("Please fill in all required fields.");return;}
    const domain=email.split("@")[1]?.toLowerCase();
    if(!ALLOWED_DOMAINS.includes(domain)){setRErr("Only @houseofcars.com and @houseofcarscalgary.com allowed.");return;}
    if(password.length<8){setRErr("Password must be at least 8 characters.");return;}
    if(password!==confirm){setRErr("Passwords do not match.");return;}
    setRLoad(true);
    const {data:ex}=await sb.from("users").select("id").eq("email",email.toLowerCase()).single();
    if(ex){setRErr("An account with this email already exists.");setRLoad(false);return;}
    const {error}=await sb.from("users").insert({email:email.toLowerCase().trim(),first_name:firstName,last_name:lastName,location,role:rf.role,password_hash:password});
    if(error){setRErr("Error: "+error.message);setRLoad(false);return;}
    setROk(true);setRLoad(false);
    setRf({firstName:"",lastName:"",email:"",location:"",role:"Sales",password:"",confirm:""});
    loadUsers();
  };

  // ── Inventory filter/sort ─────────────────────────────────────
  const invTypes=["All",...Array.from(new Set(inv.map(v=>v.type).filter(Boolean))).sort()];
  const invLocs=["All",...Array.from(new Set(inv.map(v=>v.location).filter(Boolean))).sort()];
  const filtInv=useMemo(()=>{
    let d=[...inv];
    if(iFilter!=="All")d=d.filter(v=>v.type===iFilter);
    if(iLoc!=="All")d=d.filter(v=>v.location===iLoc);
    d.sort((a,b)=>{let av=a[iSort.col],bv=b[iSort.col];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return iSort.dir==="asc"?(av>bv?1:-1):(av<bv?1:-1);});
    return d;
  },[inv,iFilter,iLoc,iSort]);
  const toggleSort=col=>setISort(s=>({col,dir:s.col===col&&s.dir==="asc"?"desc":"asc"}));
  const arr=col=>iSort.col===col?(iSort.dir==="asc"?" ↑":" ↓"):" ↕";

  // ── Vehicle search for pair/draft ─────────────────────────────
  const searchedVehicles=useMemo(()=>{
    const q=(vSearch||cSearch).toLowerCase();
    if(!q)return inv.slice(0,25);
    return inv.filter(v=>(v.make+" "+v.model+" "+v.year+" "+v.stock+" "+v.location).toLowerCase().includes(q)).slice(0,25);
  },[inv,vSearch,cSearch]);

  // ── Filtered clients for search ───────────────────────────────
  const filtClients=useMemo(()=>{
    if(!cSearch)return clients;
    const q=cSearch.toLowerCase();
    return clients.filter(c=>(c.name+" "+c.email+" "+c.phone+" "+c.location).toLowerCase().includes(q));
  },[clients,cSearch]);

  // ═══════════════════════════════════════════════════════════════
  // AUTH SCREENS
  // ═══════════════════════════════════════════════════════════════
  if(screen!=="app") return (
    <div className="auth-bg">
      <div className="auth-box fu">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:52,height:52,background:"#E63946",borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:10}}>🚗</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:3}}>HOUSE OF CARS</div>
          <div style={{fontSize:11,color:"#E63946",fontWeight:700,letterSpacing:2,marginTop:2}}>CRM COMPANION</div>
        </div>
        {authErr&&<div className="notice error fu">⚠️ {authErr}</div>}
        {authMsg&&<div className="notice success fu">✅ {authMsg}</div>}

        {screen==="login"&&<>
          <div style={{fontSize:20,fontWeight:700,marginBottom:18}}>Welcome back</div>
          <div style={{display:"grid",gap:12}}>
            <div>
              <div style={{fontSize:11,color:"#555",marginBottom:5}}>Work Email</div>
              <input className="inp" placeholder="name@houseofcars.com" value={lf.email} onChange={e=>{setLf(p=>({...p,email:e.target.value}));setAuthErr("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#555",marginBottom:5}}>Password</div>
              <div style={{position:"relative"}}>
                <input className="inp" type={showPw?"text":"password"} placeholder="••••••••" value={lf.password} onChange={e=>{setLf(p=>({...p,password:e.target.value}));setAuthErr("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={{paddingRight:42}}/>
                <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>{showPw?"🙈":"👁️"}</button>
              </div>
            </div>
            <button onClick={()=>{setScreen("forgot");setAuthErr("");setAuthMsg("");}} style={{background:"none",border:"none",color:"#E63946",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans'",textAlign:"right",padding:0}}>Forgot password?</button>
            <button className="btn-red" onClick={doLogin} disabled={authLoad} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {authLoad?<><span className="spin"></span>Signing in…</>:"Sign In"}
            </button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,margin:"18px 0",color:"#333",fontSize:12}}>
            <div style={{flex:1,height:1,background:"#1E1E2A"}}></div>or<div style={{flex:1,height:1,background:"#1E1E2A"}}></div>
          </div>
          <button onClick={()=>{setScreen("signup");setAuthErr("");}} style={{width:"100%",background:"none",border:"1px solid #252535",borderRadius:9,padding:"10px",color:"#aaa",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans'"}}>Create a new account</button>
          <p style={{textAlign:"center",fontSize:11,color:"#2a2a38",marginTop:14}}>House of Cars staff only</p>
        </>}

        {screen==="signup"&&<>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Create your account</div>
          <p style={{fontSize:12,color:"#555",marginBottom:18}}>@houseofcars.com and @houseofcarscalgary.com only.</p>
          <div style={{display:"grid",gap:11}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>First Name *</div><input className="inp" placeholder="First" value={sf.firstName} onChange={e=>{setSf(p=>({...p,firstName:e.target.value}));setAuthErr("");}}/></div>
              <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Last Name *</div><input className="inp" placeholder="Last" value={sf.lastName} onChange={e=>{setSf(p=>({...p,lastName:e.target.value}));setAuthErr("");}}/></div>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Work Email *</div><input className="inp" placeholder="name@houseofcars.com" value={sf.email} onChange={e=>{setSf(p=>({...p,email:e.target.value}));setAuthErr("");}}/></div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Location *</div>
              <select className="inp" value={sf.location} onChange={e=>setSf(p=>({...p,location:e.target.value}))}>
                <option value="">Select location…</option>
                {HOC_LOCATIONS.map(l=><option key={l} value={l}>{l}</option>)}
              </select>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:5}}>Role</div>
              <div style={{display:"flex",gap:7}}>
                {["Sales","Manager","Admin"].map(r=>(
                  <button key={r} onClick={()=>setSf(p=>({...p,role:r}))} style={{flex:1,background:sf.role===r?"rgba(230,57,70,.18)":"rgba(255,255,255,.04)",color:sf.role===r?"#E63946":"#777",border:"1px solid",borderColor:sf.role===r?"rgba(230,57,70,.4)":"#252535",borderRadius:7,padding:"7px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{r}</button>
                ))}
              </div>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Password *</div>
              <div style={{position:"relative"}}>
                <input className="inp" type={showPw?"text":"password"} placeholder="Min. 8 chars" value={sf.password} onChange={e=>setSf(p=>({...p,password:e.target.value}))} style={{paddingRight:42}}/>
                <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>{showPw?"🙈":"👁️"}</button>
              </div>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Confirm Password *</div><input className="inp" type={showPw?"text":"password"} placeholder="Repeat" value={sf.confirm} onChange={e=>setSf(p=>({...p,confirm:e.target.value}))}/></div>
            <button className="btn-red" onClick={doSignup} disabled={authLoad} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {authLoad?<><span className="spin"></span>Creating…</>:"Create Account"}
            </button>
          </div>
          <button onClick={()=>{setScreen("login");setAuthErr("");}} style={{width:"100%",background:"none",border:"none",color:"#555",fontSize:13,cursor:"pointer",marginTop:14,fontFamily:"'DM Sans'"}}>← Back to Sign In</button>
        </>}

        {screen==="forgot"&&<>
          <div style={{fontSize:20,fontWeight:700,marginBottom:6}}>Reset your password</div>
          <p style={{fontSize:13,color:"#555",marginBottom:20,lineHeight:1.6}}>Enter your email and we'll send instructions to your administrator.</p>
          <div style={{display:"grid",gap:12}}>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Work Email</div><input className="inp" placeholder="name@houseofcars.com" value={forgotEmail} onChange={e=>{setForgotEmail(e.target.value);setAuthErr("");setAuthMsg("");}}/></div>
            <button className="btn-red" onClick={doForgot} style={{width:"100%"}}>Send Instructions</button>
          </div>
          <button onClick={()=>{setScreen("login");setAuthErr("");setAuthMsg("");}} style={{width:"100%",background:"none",border:"none",color:"#555",fontSize:13,cursor:"pointer",marginTop:14,fontFamily:"'DM Sans'"}}>← Back to Sign In</button>
        </>}
      </div>
    </div>
  );

  // ═══════════════════════════════════════════════════════════════
  // MAIN APP
  // ═══════════════════════════════════════════════════════════════
  const TABS=[
    {id:"dashboard",label:"Dashboard",icon:"⬛"},
    {id:"clients",  label:"Clients",  icon:"👥", badge:clients.length, badgeColor:"#E63946"},
    {id:"inventory",label:"Inventory",icon:"🚗", badge:inv.length,     badgeColor:"#0A84FF"},
    {id:"social",   label:"Ad Drafts",icon:"📝", badge:posts.filter(p=>p.status==="Draft").length, badgeColor:"#FF9500"},
    {id:"accounts", label:"Accounts", icon:"🔐"},
  ];

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0A0A0F",minHeight:"100vh",color:"#E8E8F0",display:"flex",flexDirection:"column"}}>

      {/* ── Header ── */}
      <div style={{background:"#0D0D14",borderBottom:"1px solid #1E1E2A",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"#E63946",width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🚗</div>
          <span style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2}}>HOUSE OF CARS</span>
          <span style={{color:"#E63946",fontSize:10,fontWeight:700,background:"rgba(230,57,70,.14)",padding:"2px 8px",borderRadius:4,border:"1px solid rgba(230,57,70,.3)",marginLeft:2}}>CRM</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {synced&&<span style={{fontSize:11,color:"#444"}}>Inventory synced {synced}</span>}
          {invLoad&&<span style={{fontSize:11,color:"#FF9500",display:"flex",alignItems:"center",gap:6}}><span className="spin" style={{width:11,height:11,borderTopColor:"#FF9500"}}></span>Loading…</span>}
          <span style={{fontSize:12,color:"#666"}}>{user?.first_name} {user?.last_name} · {user?.location}</span>
          <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#E63946,#a02030)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>
            {(user?.first_name?.[0]||"")+(user?.last_name?.[0]||"")}
          </div>
          <button className="btn-sm" style={{fontSize:11}} onClick={()=>{setScreen("login");setUser(null);setInv([]);setClients([]);setPosts([]);}}>Sign Out</button>
        </div>
      </div>

      {/* ── Nav ── */}
      <div style={{background:"#0D0D14",borderBottom:"1px solid #1E1E2A",padding:"0 14px",display:"flex",gap:2,flexShrink:0,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} className={"tab-btn"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>
            {t.icon} {t.label}
            {t.badge>0&&<span style={{background:"rgba(255,255,255,.1)",color:t.badgeColor||"#aaa",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,marginLeft:2}}>{t.badge}</span>}
          </button>
        ))}
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",padding:20}}>

        {/* ════ DASHBOARD ════ */}
        {tab==="dashboard"&&(
          <div className="fu">
            <h1 style={{fontFamily:"'Bebas Neue'",fontSize:28,letterSpacing:2,marginBottom:3}}>GOOD {new Date().getHours()<12?"MORNING":new Date().getHours()<17?"AFTERNOON":"EVENING"}, {user?.first_name?.toUpperCase()}</h1>
            <p style={{fontSize:12,color:"#444",marginBottom:20}}>{new Date().toLocaleDateString("en-CA",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</p>
            {invLoad&&<div className="notice warn" style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}><span className="spin" style={{borderTopColor:"#FF9500",borderColor:"rgba(255,149,0,.3)"}}></span>Loading live inventory from houseofcars.com…</div>}
            {invErr&&<div className="notice error" style={{marginBottom:18}}>⚠️ {invErr} <button className="btn-sm" style={{marginLeft:12,fontSize:11}} onClick={()=>loadInv()}>Retry</button></div>}

            <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
              {[
                {label:"Total Clients",value:clients.length,color:"#E63946",tab:"clients"},
                {label:"Hot Leads",value:clients.filter(c=>c.status==="Hot").length,color:"#FF3B30",tab:"clients"},
                {label:"Live Inventory",value:invLoad?"…":inv.length,color:"#0A84FF",tab:"inventory"},
                {label:"Ad Drafts",value:posts.filter(p=>p.status==="Draft").length,color:"#FF9500",tab:"social"},
                {label:"Posted Ads",value:posts.filter(p=>p.status==="Posted").length,color:"#34C759",tab:"social"},
              ].map(s=>(
                <div key={s.label} className="card" style={{minWidth:100,flex:1,cursor:"pointer"}} onClick={()=>setTab(s.tab)}>
                  <div style={{fontSize:26,fontFamily:"'Bebas Neue'",color:s.color}}>{s.value}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#666"}}>{s.label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div className="card">
                <div style={{fontSize:11,fontWeight:700,color:"#E63946",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>🔥 Hot Leads</div>
                {clients.filter(c=>c.status==="Hot").length===0&&<p style={{fontSize:13,color:"#444",padding:"8px 0"}}>No hot leads yet.</p>}
                {clients.filter(c=>c.status==="Hot").slice(0,5).map(c=>(
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #14141e",cursor:"pointer"}} onClick={()=>{setSelC(c);setTab("clients");}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{c.name}</div>
                      <div style={{fontSize:11,color:"#444"}}>{c.interested_in||"No vehicle paired"}</div>
                    </div>
                    <span style={{fontSize:11,color:"#333",whiteSpace:"nowrap",marginLeft:8}}>{fmtDate(c.last_contact)}</span>
                  </div>
                ))}
                <button className="btn-sm" style={{marginTop:10,width:"100%",fontSize:12}} onClick={()=>setTab("clients")}>View All Clients →</button>
              </div>
              <div className="card">
                <div style={{fontSize:11,fontWeight:700,color:"#0A84FF",marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>🚗 Latest Inventory</div>
                {invLoad?[1,2,3,4].map(i=><div key={i} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:"1px solid #14141e"}}><div className="skeleton" style={{flex:1}}></div><div className="skeleton" style={{width:60}}></div></div>):
                  inv.slice(0,5).map((v,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #14141e"}}>
                      <div><div style={{fontSize:13,fontWeight:600}}>{v.year} {v.make} {v.model}</div><div style={{fontSize:11,color:"#444"}}>{v.location}</div></div>
                      <span style={{fontSize:12,fontWeight:700,color:"#E63946",whiteSpace:"nowrap",marginLeft:8}}>{fmtCur(v.price)}</span>
                    </div>
                  ))
                }
                <button className="btn-sm" style={{marginTop:10,width:"100%",fontSize:12}} onClick={()=>setTab("inventory")}>View All {inv.length} Vehicles →</button>
              </div>
            </div>
          </div>
        )}

        {/* ════ CLIENTS ════ */}
        {tab==="clients"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div><h2 style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:2}}>CLIENTS</h2><p style={{fontSize:12,color:"#444"}}>{clients.length} contacts saved to database</p></div>
              <button className="btn-red" onClick={()=>{setCf({name:"",phone:"",email:"",location:"",status:"Warm",notes:"",interested_in:"",paired_vehicle_stock:""});setAddC(true);}}>+ Add New Client</button>
            </div>
            {cMsg.t&&<div className={"notice "+cMsg.type+" fu"}>{cMsg.t}</div>}

            <input className="inp" placeholder="🔍 Search clients by name, email, phone…" value={cSearch} onChange={e=>setCSearch(e.target.value)} style={{marginBottom:14}}/>

            <div style={{display:"grid",gridTemplateColumns:selC?"1fr 390px":"1fr",gap:18,alignItems:"start"}}>
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                {cLoad?<div style={{padding:20,color:"#555",textAlign:"center"}}>Loading clients…</div>:
                 filtClients.length===0?<div style={{padding:30,color:"#555",textAlign:"center"}}>{cSearch?"No clients match your search.":"No clients yet — add your first one!"}</div>:
                 filtClients.map(c=>(
                  <div key={c.id} className={"lead-row"+(selC?.id===c.id?" sel":"")} onClick={()=>setSelC(c)}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:"#181828",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#E63946",flexShrink:0}}>
                      {c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:600}}>{c.name}</span>
                        <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:STATUS_C[c.status]?.bg||"#555",color:"#fff"}}>{c.status}</span>
                      </div>
                      <div style={{fontSize:12,color:"#444",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.interested_in||"No vehicle paired"} {c.location?"· "+c.location:""}</div>
                    </div>
                    <span style={{fontSize:11,color:"#333",flexShrink:0,marginLeft:8}}>{fmtDate(c.last_contact)}</span>
                  </div>
                ))}
              </div>

              {selC&&(
                <div className="card fu" style={{position:"sticky",top:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                    <div>
                      <h3 style={{fontSize:17,fontWeight:700}}>{selC.name}</h3>
                      <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:STATUS_C[selC.status]?.bg||"#555",color:"#fff",display:"inline-block",marginTop:5}}>{selC.status}</span>
                    </div>
                    <button style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:22,lineHeight:1}} onClick={()=>setSelC(null)}>×</button>
                  </div>
                  <div style={{display:"grid",gap:8,marginBottom:14}}>
                    {selC.phone&&<div style={{display:"flex",gap:10,fontSize:13,color:"#888",alignItems:"center"}}><span>📞</span><a href={"tel:"+selC.phone} style={{color:"#888",textDecoration:"none"}}>{selC.phone}</a></div>}
                    {selC.email&&<div style={{display:"flex",gap:10,fontSize:13,color:"#888",alignItems:"center"}}><span>✉️</span><a href={"mailto:"+selC.email} style={{color:"#888",textDecoration:"none"}}>{selC.email}</a></div>}
                    {selC.location&&<div style={{display:"flex",gap:10,fontSize:13,color:"#888",alignItems:"center"}}><span>📍</span><span>{selC.location}</span></div>}
                  </div>
                  {selC.notes&&(
                    <div style={{background:"#0D0D14",borderRadius:10,padding:12,marginBottom:14}}>
                      <div style={{fontSize:10,color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Notes</div>
                      <p style={{fontSize:13,color:"#777",lineHeight:1.7}}>{selC.notes}</p>
                    </div>
                  )}
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:10,color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Paired Vehicle</div>
                    {selC.interested_in?(
                      <div style={{background:"rgba(230,57,70,.07)",border:"1px solid rgba(230,57,70,.2)",borderRadius:10,padding:12}}>
                        <div style={{fontSize:13,fontWeight:700}}>{selC.interested_in}</div>
                        {selC.paired_vehicle_stock&&<div style={{fontSize:12,color:"#555",marginTop:2}}>Stock #{selC.paired_vehicle_stock}</div>}
                        <div style={{display:"flex",gap:8,marginTop:10}}>
                          <button className="btn-sm" style={{fontSize:11}} onClick={()=>{setCSearch("");setPairModal(selC);}}>Change</button>
                          <button className="btn-sm" style={{fontSize:11}} onClick={()=>openDraft(inv.find(v=>v.stock===selC.paired_vehicle_stock)||null)}>📝 Draft Ad</button>
                        </div>
                      </div>
                    ):(
                      <button className="btn-sm" style={{width:"100%"}} onClick={()=>{setCSearch("");setPairModal(selC);}}>+ Pair a Vehicle</button>
                    )}
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn-red" style={{flex:1,fontSize:12}} onClick={()=>{setCf({name:selC.name,phone:selC.phone||"",email:selC.email||"",location:selC.location||"",status:selC.status,notes:selC.notes||"",interested_in:selC.interested_in||"",paired_vehicle_stock:selC.paired_vehicle_stock||""});setEditC(true);}}>✏️ Edit Client</button>
                    <button className="btn-sm" style={{color:"#E63946",fontSize:12}} onClick={()=>deleteClient(selC.id)}>🗑️ Delete</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ════ INVENTORY ════ */}
        {tab==="inventory"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <h2 style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:2}}>LIVE INVENTORY</h2>
                <p style={{fontSize:12,color:"#444"}}>{invLoad?"Fetching from houseofcars.com…":inv.length+" vehicles"+(synced?" · last synced "+synced:"")}</p>
              </div>
              <button className="btn-red" onClick={()=>loadInv(true)} disabled={syncing||invLoad} style={{display:"flex",alignItems:"center",gap:8}}>
                {syncing?<><span className="spin"></span>Syncing…</>:"🔄 Sync Live Inventory"}
              </button>
            </div>
            {syncMsg.t&&<div className={"notice "+syncMsg.type+" fu"}>{syncMsg.t}</div>}
            {invLoad&&<div className="card" style={{padding:0,overflow:"hidden"}}>{[1,2,3,4,5,6].map(i=><div key={i} style={{display:"flex",gap:16,padding:"12px 16px",borderBottom:"1px solid #12121c"}}>{[80,60,80,120,70,100,60,70].map((w,j)=><div key={j} className="skeleton" style={{width:w,flexShrink:0}}></div>)}</div>)}</div>}
            {!invLoad&&<>
              <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {invTypes.map(t=><button key={t} onClick={()=>setIFilter(t)} style={{background:iFilter===t?"#E63946":"rgba(255,255,255,.05)",color:iFilter===t?"#fff":"#777",border:"1px solid",borderColor:iFilter===t?"#E63946":"#252535",borderRadius:7,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{t}</button>)}
                </div>
                <select className="inp" style={{width:"auto",minWidth:160,fontSize:12,padding:"6px 12px"}} value={iLoc} onChange={e=>setILoc(e.target.value)}>
                  {invLocs.map(l=><option key={l} value={l}>{l==="All"?"All Locations":"📍 "+l}</option>)}
                </select>
                <span style={{fontSize:11,color:"#444",marginLeft:"auto"}}>{filtInv.length} vehicles shown</span>
              </div>
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{background:"#0D0D14"}}>
                      {[["stock","Stock"],["year","Year"],["make","Make"],["model","Model"],["price","Price"],["location","Location"],["type","Type"],["mileage","KM"]].map(([c,l])=>(
                        <th key={c} onClick={()=>toggleSort(c)}>{l}{arr(c)}</th>
                      ))}
                      <th>Actions</th>
                    </tr></thead>
                    <tbody>
                      {filtInv.map((v,i)=>(
                        <tr key={i}>
                          <td><span style={{fontFamily:"monospace",fontSize:11,color:"#555"}}>{v.stock}</span></td>
                          <td style={{fontWeight:700}}>{v.year}</td>
                          <td>{v.make}</td>
                          <td>{v.model}</td>
                          <td style={{color:"#E63946",fontWeight:700}}>{fmtCur(v.price)}</td>
                          <td><span style={{fontSize:11,background:"rgba(255,255,255,.04)",border:"1px solid #252535",borderRadius:5,padding:"2px 8px",whiteSpace:"nowrap"}}>📍 {v.location}</span></td>
                          <td>{v.type&&<span className="tag">{v.type}</span>}</td>
                          <td style={{color:"#555",fontSize:12}}>{v.mileage}</td>
                          <td>
                            <div style={{display:"flex",gap:6,flexWrap:"nowrap"}}>
                              <button className="btn-sm" style={{fontSize:11,padding:"4px 10px",whiteSpace:"nowrap"}} onClick={()=>openDraft(v)}>📝 Draft Ad</button>
                              {v.listingUrl&&<a href={v.listingUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:11,padding:"4px 9px",background:"rgba(255,255,255,.07)",color:"#bbb",border:"1px solid #2a2a38",borderRadius:7,textDecoration:"none",whiteSpace:"nowrap"}}>↗ View</a>}
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>}
          </div>
        )}

        {/* ════ AD DRAFTS ════ */}
        {tab==="social"&&(
          <div className="fu">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div><h2 style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:2}}>AD DRAFTS</h2><p style={{fontSize:12,color:"#444"}}>{posts.length} total · {posts.filter(p=>p.status==="Draft").length} drafts · {posts.filter(p=>p.status==="Posted").length} posted</p></div>
              <button className="btn-red" onClick={()=>openDraft()}>+ New Ad Draft</button>
            </div>
            {pMsg.t&&<div className={"notice "+pMsg.type+" fu"}>{pMsg.t}</div>}

            <div className="notice info" style={{marginBottom:20,display:"flex",gap:14,alignItems:"flex-start"}}>
              <span style={{fontSize:22,flexShrink:0}}>📘</span>
              <div>
                <div style={{fontWeight:700,marginBottom:4}}>How Facebook Marketplace posting works</div>
                <div style={{fontSize:12,color:"#4da3ff",lineHeight:1.7}}>Meta does not allow automated Marketplace posts via API. When you click <strong>"Copy & Open Marketplace"</strong>, your ad text is automatically copied to your clipboard and Facebook Marketplace opens in a new tab. Just paste your text, fill in the vehicle details, and publish. Full Facebook Page posting (not Marketplace) can be set up via a Facebook Developer App — see the Accounts tab for instructions.</div>
              </div>
            </div>

            {pLoad?<div style={{color:"#555"}}>Loading drafts…</div>:
             posts.length===0?(
               <div className="card" style={{textAlign:"center",padding:48}}>
                 <div style={{fontSize:40,marginBottom:12}}>📝</div>
                 <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>No ad drafts yet</div>
                 <p style={{fontSize:13,color:"#555",marginBottom:20}}>Draft ads from any vehicle in your inventory, or start a blank draft.</p>
                 <button className="btn-red" onClick={()=>openDraft()}>Create Your First Ad Draft</button>
               </div>
             ):(
               <div style={{display:"grid",gap:14}}>
                 {posts.map(p=>(
                   <div key={p.id} className="card">
                     <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,gap:10}}>
                       <div style={{flex:1,minWidth:0}}>
                         <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{p.vehicle_title||"Untitled Draft"}</div>
                         <div style={{fontSize:11,color:"#444"}}>
                           Drafted {fmtDate(p.created_at)} by {users.find(u=>u.id===p.created_by)?.first_name||"Unknown"}
                           {p.posted_at&&" · Posted "+fmtDate(p.posted_at)}
                         </div>
                       </div>
                       <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                         <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:700,background:p.status==="Posted"?"rgba(52,199,89,.15)":"rgba(255,149,0,.15)",color:p.status==="Posted"?"#34C759":"#FF9500",border:"1px solid",borderColor:p.status==="Posted"?"rgba(52,199,89,.3)":"rgba(255,149,0,.3)"}}>{p.status}</span>
                         <button className="btn-sm" style={{fontSize:11}} onClick={()=>openDraft(null,p)}>✏️ Edit</button>
                         <button className="btn-sm" style={{fontSize:11,color:"#E63946"}} onClick={()=>deletePost(p.id)}>🗑️</button>
                       </div>
                     </div>
                     <pre style={{fontSize:12,color:"#666",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"'DM Sans'",background:"#0D0D14",borderRadius:9,padding:"12px 14px",maxHeight:130,overflow:"hidden",borderBottom:"2px solid transparent",position:"relative"}}>{p.draft_text}</pre>
                     {p.status!=="Posted"&&(
                       <button className="btn-green" style={{marginTop:12,fontSize:13,display:"flex",alignItems:"center",gap:8}} onClick={()=>{navigator.clipboard.writeText(p.draft_text).catch(()=>{});window.open("https://www.facebook.com/marketplace/create/vehicle","_blank");sb.from("posts").update({status:"Posted",posted_at:new Date().toISOString()}).eq("id",p.id).then(()=>loadPosts());}}>
                         📋 Copy & Open Facebook Marketplace
                       </button>
                     )}
                   </div>
                 ))}
               </div>
             )}
          </div>
        )}

        {/* ════ ACCOUNTS ════ */}
        {tab==="accounts"&&(
          <div className="fu">
            <div style={{marginBottom:18}}><h2 style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:2}}>ACCOUNTS</h2><p style={{fontSize:12,color:"#444"}}>{users.length} registered users · @houseofcars.com and @houseofcarscalgary.com only</p></div>

            <div className="notice info" style={{marginBottom:20}}>
              <div style={{fontWeight:700,marginBottom:6}}>📘 Setting up Facebook Page posting</div>
              <div style={{fontSize:12,color:"#4da3ff",lineHeight:1.8}}>
                For automated posting to a <strong>Facebook Page</strong> (not Marketplace), you need a Meta Developer App:<br/>
                1. Go to <a href="https://developers.facebook.com/apps/create/" target="_blank" style={{color:"#fff"}}>developers.facebook.com/apps/create</a> → choose <strong>Business</strong> type<br/>
                2. Add the <strong>Facebook Login</strong> product<br/>
                3. Request permissions: <code style={{background:"#1a1a2e",padding:"1px 6px",borderRadius:3}}>pages_manage_posts</code>, <code style={{background:"#1a1a2e",padding:"1px 6px",borderRadius:3}}>pages_read_engagement</code><br/>
                4. Once approved by Meta (1–2 weeks), share your App ID here and I'll wire it into the CRM so each user can connect their Facebook Page directly from their profile.
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 390px",gap:18,alignItems:"start"}}>
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{background:"#0D0D14"}}>
                      <th>Name</th><th>Email</th><th>Location</th><th>Role</th><th>Joined</th>
                    </tr></thead>
                    <tbody>
                      {uLoad?<tr><td colSpan={5} style={{color:"#555",textAlign:"center",padding:20}}>Loading…</td></tr>:
                       users.length===0?<tr><td colSpan={5} style={{color:"#555",textAlign:"center",padding:20}}>No users yet.</td></tr>:
                       users.map((u,i)=>(
                        <tr key={i}>
                          <td style={{fontWeight:600}}>{u.first_name} {u.last_name} {u.id===user?.id&&<span style={{fontSize:10,color:"#E63946",background:"rgba(230,57,70,.14)",padding:"1px 6px",borderRadius:4,marginLeft:4}}>You</span>}</td>
                          <td style={{fontSize:12,color:"#666",fontFamily:"monospace"}}>{u.email}</td>
                          <td><span style={{fontSize:11,background:"rgba(255,255,255,.04)",border:"1px solid #252535",borderRadius:5,padding:"2px 7px"}}>📍 {u.location}</span></td>
                          <td><span style={{fontSize:11,background:u.role==="Admin"?"rgba(230,57,70,.14)":u.role==="Manager"?"rgba(255,149,0,.14)":"rgba(10,132,255,.14)",color:u.role==="Admin"?"#E63946":u.role==="Manager"?"#FF9500":"#0A84FF",border:"1px solid",borderColor:u.role==="Admin"?"rgba(230,57,70,.3)":u.role==="Manager"?"rgba(255,149,0,.3)":"rgba(10,132,255,.3)",borderRadius:5,padding:"2px 8px",fontWeight:700}}>{u.role}</span></td>
                          <td style={{fontSize:12,color:"#555"}}>{new Date(u.created_at).toLocaleDateString("en-CA",{month:"short",year:"numeric"})}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="card" style={{position:"sticky",top:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#E63946",marginBottom:14,letterSpacing:1,textTransform:"uppercase"}}>🔐 Create New Account</div>
                {rOk&&<div className="notice success">✅ Account created! They can now sign in.</div>}
                {rErr&&<div className="notice error">⚠️ {rErr}</div>}
                <div style={{display:"grid",gap:10}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                    <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>First Name</div><input className="inp" placeholder="First" value={rf.firstName} onChange={e=>{setRf(p=>({...p,firstName:e.target.value}));setRErr("");setROk(false);}}/></div>
                    <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Last Name</div><input className="inp" placeholder="Last" value={rf.lastName} onChange={e=>{setRf(p=>({...p,lastName:e.target.value}));setRErr("");setROk(false);}}/></div>
                  </div>
                  <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Work Email</div><input className="inp" placeholder="name@houseofcars.com" value={rf.email} onChange={e=>{setRf(p=>({...p,email:e.target.value}));setRErr("");setROk(false);}}/></div>
                  <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Location</div>
                    <select className="inp" value={rf.location} onChange={e=>setRf(p=>({...p,location:e.target.value}))}>
                      <option value="">Select…</option>
                      {HOC_LOCATIONS.map(l=><option key={l} value={l}>{l}</option>)}
                    </select>
                  </div>
                  <div><div style={{fontSize:11,color:"#444",marginBottom:5}}>Role</div>
                    <div style={{display:"flex",gap:7}}>
                      {["Sales","Manager","Admin"].map(r=>(
                        <button key={r} onClick={()=>setRf(p=>({...p,role:r}))} style={{flex:1,background:rf.role===r?"rgba(230,57,70,.15)":"rgba(255,255,255,.04)",color:rf.role===r?"#E63946":"#666",border:"1px solid",borderColor:rf.role===r?"rgba(230,57,70,.35)":"#252535",borderRadius:7,padding:"6px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{r}</button>
                      ))}
                    </div>
                  </div>
                  <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Temporary Password</div><input className="inp" type="password" placeholder="Min. 8 chars" value={rf.password} onChange={e=>setRf(p=>({...p,password:e.target.value}))}/></div>
                  <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Confirm Password</div><input className="inp" type="password" placeholder="Repeat" value={rf.confirm} onChange={e=>setRf(p=>({...p,confirm:e.target.value}))}/></div>
                  <button className="btn-red" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={doRegister} disabled={rLoad}>
                    {rLoad?<><span className="spin"></span>Creating…</>:"Create Account"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ════ ADD CLIENT MODAL ════ */}
      {addC&&(
        <div className="overlay" onClick={()=>setAddC(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2}}>ADD NEW CLIENT</h3>
              <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22}} onClick={()=>setAddC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Full Name *</div><input className="inp" placeholder="Full name" value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Phone</div><input className="inp" placeholder="403-555-0000" value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Email</div><input className="inp" type="email" placeholder="client@email.com" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Location / Area</div><input className="inp" placeholder="e.g. Calgary NW" value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:5}}>Status</div>
                <div style={{display:"flex",gap:8}}>
                  {["Hot","Warm","Cold"].map(s=>(
                    <button key={s} onClick={()=>setCf(p=>({...p,status:s}))} style={{flex:1,background:cf.status===s?STATUS_C[s].bg:"rgba(255,255,255,.05)",color:cf.status===s?"#fff":"#777",border:"1px solid",borderColor:cf.status===s?STATUS_C[s].bg:"#252535",borderRadius:7,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Interested In</div>
                <select className="inp" value={cf.interested_in} onChange={e=>{const v=inv.find(x=>x.year+" "+x.make+" "+x.model===e.target.value);setCf(p=>({...p,interested_in:e.target.value,paired_vehicle_stock:v?.stock||""}));}}>
                  <option value="">Select a vehicle from inventory…</option>
                  {inv.slice(0,150).map((v,i)=><option key={i} value={v.year+" "+v.make+" "+v.model}>{v.year} {v.make} {v.model} — {fmtCur(v.price)} · {v.location}</option>)}
                </select>
              </div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Notes</div><textarea className="inp" placeholder="Financing status, preferences, follow-up notes…" value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button className="btn-red" onClick={saveClient}>Save Client</button>
            </div>
          </div>
        </div>
      )}

      {/* ════ EDIT CLIENT MODAL ════ */}
      {editC&&(
        <div className="overlay" onClick={()=>setEditC(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2}}>EDIT CLIENT</h3>
              <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22}} onClick={()=>setEditC(false)}>×</button>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Full Name *</div><input className="inp" value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Phone</div><input className="inp" value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))}/></div>
                <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Email</div><input className="inp" type="email" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div>
              </div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Location</div><input className="inp" value={cf.location} onChange={e=>setCf(p=>({...p,location:e.target.value}))}/></div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:5}}>Status</div>
                <div style={{display:"flex",gap:8}}>
                  {["Hot","Warm","Cold"].map(s=>(
                    <button key={s} onClick={()=>setCf(p=>({...p,status:s}))} style={{flex:1,background:cf.status===s?STATUS_C[s].bg:"rgba(255,255,255,.05)",color:cf.status===s?"#fff":"#777",border:"1px solid",borderColor:cf.status===s?STATUS_C[s].bg:"#252535",borderRadius:7,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div><div style={{fontSize:11,color:"#444",marginBottom:4}}>Notes</div><textarea className="inp" value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))}/></div>
              <button className="btn-red" onClick={updateClient}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* ════ PAIR VEHICLE MODAL ════ */}
      {pairModal&&(
        <div className="overlay" onClick={()=>{setPairModal(null);setCSearch("");}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2}}>PAIR VEHICLE — {pairModal.name?.toUpperCase()}</h3>
              <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22}} onClick={()=>{setPairModal(null);setCSearch("");}}>×</button>
            </div>
            <input className="inp" placeholder="🔍 Search by make, model, year, stock #, location…" value={cSearch} onChange={e=>setCSearch(e.target.value)} style={{marginBottom:12}} autoFocus/>
            <div style={{display:"grid",gap:8,maxHeight:420,overflowY:"auto"}}>
              {searchedVehicles.map((v,i)=>(
                <div key={i} onClick={()=>pairVehicle(pairModal,v)} style={{display:"flex",alignItems:"center",gap:12,background:pairModal.paired_vehicle_stock===v.stock?"rgba(230,57,70,.1)":"#0D0D14",border:"1px solid "+(pairModal.paired_vehicle_stock===v.stock?"#E63946":"#1a1a24"),borderRadius:10,padding:"11px 14px",cursor:"pointer",transition:"all .15s"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{typeEmoji(v.type)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}}>{v.year} {v.make} {v.model}</div>
                    <div style={{fontSize:11,color:"#555"}}>#{v.stock} · {v.location} · {v.mileage}</div>
                  </div>
                  <span style={{fontSize:14,fontWeight:700,color:"#E63946",flexShrink:0}}>{fmtCur(v.price)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════ AD DRAFT MODAL ════ */}
      {draftOpen&&(
        <div className="overlay" onClick={()=>setDraftOpen(false)}>
          <div className="modal" style={{width:660}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h3 style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2}}>📝 {editPost?"EDIT AD DRAFT":"NEW AD DRAFT"}</h3>
              <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:22}} onClick={()=>setDraftOpen(false)}>×</button>
            </div>

            {/* Vehicle picker */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#444",marginBottom:6}}>Vehicle {draftV&&<span style={{color:"#E63946"}}>· {draftV.year} {draftV.make} {draftV.model}</span>}</div>
              <input className="inp" placeholder="🔍 Search inventory to select a vehicle…" value={vSearch} onChange={e=>setVSearch(e.target.value)}/>
              {vSearch&&(
                <div style={{background:"#0D0D14",border:"1px solid #252535",borderRadius:9,maxHeight:200,overflowY:"auto",marginTop:6}}>
                  {searchedVehicles.length===0&&<div style={{padding:14,color:"#555",fontSize:13}}>No vehicles match.</div>}
                  {searchedVehicles.map((v,i)=>(
                    <div key={i} onClick={()=>{setDraftV(v);setDraftTitle(v.year+" "+v.make+" "+v.model);setDraftText(buildDraftText(v));setVSearch("");}} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #14141e",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span>{typeEmoji(v.type)} <strong>{v.year} {v.make} {v.model}</strong></span>
                      <span style={{color:"#555",fontSize:11}}>#{v.stock} · {fmtCur(v.price)} · {v.location}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#444",marginBottom:5}}>Ad Title</div>
              <input className="inp" placeholder="e.g. 2022 Ford F-150 XLT — House of Cars Airdrie" value={draftTitle} onChange={e=>setDraftTitle(e.target.value)}/>
            </div>

            <div style={{marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{fontSize:11,color:"#444"}}>Ad Text</div>
                <span style={{fontSize:11,color:"#444"}}>{draftText.length} characters</span>
              </div>
              <textarea className="inp" style={{minHeight:240,fontSize:13,lineHeight:1.75}} value={draftText} onChange={e=>setDraftText(e.target.value)} placeholder="Write your ad here. Select a vehicle above to auto-generate a template."/>
            </div>

            <div className="notice info" style={{marginBottom:16,fontSize:12}}>
              📋 Clicking <strong>"Copy & Open Marketplace"</strong> copies your ad to clipboard and opens Facebook Marketplace in a new tab. Paste and fill in vehicle details to post.
            </div>

            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button className="btn-green" style={{flex:2,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={openMarketplace}>
                📋 Copy & Open Facebook Marketplace
              </button>
              <button className="btn-sm" style={{flex:1}} onClick={()=>saveDraft("Draft")}>💾 Save Draft</button>
              <button className="btn-sm" onClick={()=>setDraftOpen(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
